        <tbody>${itemRows||`<tr><td colspan="${IS_ADMIN?5:4}" style="padding:20px;text-align:center;color:var(--tx3);font-size:12px">세부항목 없음</td></tr>`}</tbody>
        <tfoot><tr style="background:var(--sf2);font-weight:700">
          <td colspan="3" style="padding:10px 12px;font-size:13px">합계</td>
          <td style="padding:10px 12px;font-size:13px;text-align:right;color:var(--g)">${total.toLocaleString()}원</td>
          ${IS_ADMIN?'<td></td>':''}
        </tfoot>
      </table>
      ${t.note?`<div style="padding:10px 14px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx2)">📝 ${t.note}</div>`:''}
      ${IS_ADMIN?`<div style="padding:10px 12px;border-top:1px solid var(--bd)">
        <button class="tbtn" onclick="openAddTItem(${t._idx})" style="font-size:11px;padding:4px 10px;color:var(--b)">+ 세부항목 추가</button>
      </div>`:''}
    </div>`;
  }

  // 우측 영역: 전체보기(연단위) / 월 선택 / 일반
  let detailHtml;
  if(R._tAllView){
    // 전체보기: 연도 탭
    const byYear={};
    ts.forEach((t,i)=>{
      if(!t.date)return;
      const y=t.date.substring(0,4);
      if(!byYear[y])byYear[y]=[];
      byYear[y].push({...t,_idx:i});
    });
    const years=Object.keys(byYear).sort().reverse();
    if(!R._tAllYear||!byYear[R._tAllYear])R._tAllYear=years[0]||null;
    const yearTabs=years.map(y=>{
      const yTotal=byYear[y].reduce((s,t)=>{const a=(t.items||[]).reduce((ss,it)=>ss+(parseInt(it.amount)||0),0);return s+a;},0);
      const isOn=R._tAllYear===y;
      return`<button onclick="R._tAllYear='${y}';renderT()" style="padding:5px 14px;border-radius:8px;border:1px solid ${isOn?'#1e1b4b':'var(--bd)'};font-size:12px;cursor:pointer;background:${isOn?'#1e1b4b':'white'};color:${isOn?'white':'var(--tx2)'};font-family:inherit;white-space:nowrap;font-weight:${isOn?'700':'400'}">${y}년 <span style="font-size:11px;color:${isOn?'#a5b4fc':'var(--tx3)'}">${yTotal.toLocaleString()}원</span></button>`;
    }).join('');
    const cards=(byYear[R._tAllYear]||[]).map(t=>makeDetailBlock(t)).join('');
    detailHtml=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bd)">${yearTabs}</div>${cards||'<div style="padding:30px;text-align:center;color:var(--tx3)">내역 없음</div>'}`;
  } else if(monthAllItems){
    // 월 선택 모드: 모든 항목 카드 순서대로 표시
    if(monthAllItems.length){
      // 선택된 항목 강조 (스크롤 앵커용 id 부여)
      detailHtml=monthAllItems.map(t=>`<div id="detail-${t._idx}">${makeDetailBlock(t)}</div>`).join('');
    } else {
      detailHtml='<div style="padding:30px;text-align:center;color:var(--tx3)">해당 월 내역 없음</div>';
    }
  } else {
    const cur=curItems.find(t=>t._idx===R._tItem);
    detailHtml=cur?makeDetailBlock(cur):'<div style="padding:30px;text-align:center;color:var(--tx3)">항목을 선택해주세요</div>';
  }
  // 월별 요약
  const monthMap={};
  ts.forEach(t=>{
    if(!t.date)return;
    const ym=t.date.substring(0,7);
    if(!monthMap[ym])monthMap[ym]={total:0,items:[]};
    const amt=(t.items||[]).reduce((s,it)=>s+(parseInt(it.amount)||0),0);
    monthMap[ym].total+=amt;
    monthMap[ym].items.push({title:t.title,category:t.category,amount:amt});
  });
  // 월별 클릭 선택 상태
  const sortedMonths=Object.keys(monthMap).sort();
  if(R._tSelMonth===undefined)R._tSelMonth=null;
  if(R._tSelMonth&&!monthMap[R._tSelMonth])R._tSelMonth=null;
  // 정렬: 기본 내림차순(최신 왼쪽), 오름차순(오래된 것 왼쪽→최신 오른쪽)
  const displayMonths=R._tMonthAsc?[...sortedMonths]:[...sortedMonths].reverse();
  const monthSummary=displayMonths.map(ym=>{
    const [y,m]=ym.split('-');
    const isActive=R._tSelMonth===ym;
    const items=monthMap[ym].items;
    const maxVisible=2;
    const visibleItems=items.slice(0,maxVisible);
    const hiddenCount=items.length-maxVisible;
    const makeRow=it=>`
      <div class="month-card-row">
        <span class="month-card-row-name">${it.category?`[${it.category}] `:''}${it.title}</span>
        <span class="month-card-row-amt">${it.amount.toLocaleString()}원</span>
      </div>`;
    const rows=visibleItems.map(makeRow).join('');
    const hiddenRows=items.slice(maxVisible).map(makeRow).join('');
    const expandBtn=hiddenCount>0?`<button class="month-card-expand" onclick="event.stopPropagation();toggleMonthExpand('${ym}',this)">▼</button>`:'';
    return `<div class="month-card${isActive?' active':''}" onclick="selectMonthCard('${ym}')">
      <div class="month-card-head">
        <span class="month-card-title">${y}년 <strong>${parseInt(m)}월</strong></span>
        <button class="month-card-share" onclick="event.stopPropagation();shareMonth('${ym}')" title="${y}년 ${parseInt(m)}월 공유">🔗</button>
      </div>
      <div class="month-card-body">
        <div class="month-card-total">${monthMap[ym].total.toLocaleString()}원</div>
        ${rows}
        <div class="month-card-hidden" style="display:none">${hiddenRows}</div>
        ${expandBtn}
      </div>
    </div>`;
  }).join('');

  const pubBase=location.href.split('?')[0];
  tl.innerHTML=`
    <div style="padding:0">
      <div style="margin-bottom:12px">
        <div style="font-size:15px;font-weight:700">지출내역</div>
      </div>
      <!-- 월별 요약 슬라이더 -->
      ${monthSummary?`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:var(--tx2)">📅 월별 합계 <span style="font-size:10px;font-weight:400;color:var(--tx3)">클릭하면 아래 내역으로 이동</span></div>
          <button onclick="R._tMonthAsc=!R._tMonthAsc;renderT()" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--bd);background:white;color:var(--tx2);cursor:pointer;font-family:inherit;white-space:nowrap">${R._tMonthAsc?'최신순 ↓':'오래된순 ↑'}</button>
        </div>
        <div class="month-scroll-wrap">
          <button class="mscroll-btn left" onclick="scrollMonths(-1)" id="msc-l">◀</button>
          <div class="month-scroll-inner" id="month-scroll-inner">${monthSummary}</div>
          <button class="mscroll-btn right" onclick="scrollMonths(1)" id="msc-r">▶</button>
        </div>
      </div><div style="border-top:1px solid var(--bd);margin-bottom:14px"></div>`:''}
      <!-- 상세 내역 -->
      <div id="t-detail-area">
      <!-- 공통 상단 바: 뷰 전환 버튼(왼쪽) + 지출내역 추가(오른쪽) -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${monthAllItems?(()=>{const[y,m]=R._tSelMonth.split('-');return`<span style="font-size:13px;font-weight:700;margin-right:2px">📅 ${y}년 ${parseInt(m)}월</span>`;})():''}
          ${R._tAllView?`<span style="font-size:13px;font-weight:700;margin-right:2px">📋 전체 지출내역</span>`:''}
          <button onclick="R._tSelMonth=null;R._tCat=null;R._tAllView=false;renderT()" style="font-size:11px;color:${(!monthAllItems&&!R._tAllView)?'white':'var(--tx2)'};background:${(!monthAllItems&&!R._tAllView)?'#1e1b4b':'var(--sf2)'};border:1px solid ${(!monthAllItems&&!R._tAllView)?'#1e1b4b':'var(--bd)'};border-radius:6px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:${(!monthAllItems&&!R._tAllView)?'700':'400'}">항목별 보기</button>
          <button onclick="R._tAllView=true;R._tSelMonth=null;R._tCat=null;renderT()" style="font-size:11px;color:${R._tAllView?'white':'var(--tx2)'};background:${R._tAllView?'#1e1b4b':'var(--sf2)'};border:1px solid ${R._tAllView?'#1e1b4b':'var(--bd)'};border-radius:6px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:${R._tAllView?'700':'400'}">전체보기</button>
        </div>
        ${IS_ADMIN?`<button onclick="openAddT()" style="padding:5px 14px;font-size:12px;white-space:nowrap;flex-shrink:0;background:#1e1b4b;color:white;border:none;border-radius:8px;font-weight:700;font-family:inherit;cursor:pointer;margin-left:auto">+ 지출내역 추가</button>`:''}
      </div>
      <!-- 항목별 보기: 카테고리 탭 별도 줄 -->
      ${(!monthAllItems&&!R._tAllView)?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)">${catTabs}</div>`:''}
      <!-- 콘텐츠 -->
      ${(monthAllItems||R._tAllView)?`
        <div>${detailHtml}</div>
      `:`
        <div style="display:flex;gap:12px">
          <div style="width:180px;flex-shrink:0;display:flex;flex-direction:column;gap:4px">${itemTabs||'<span style="font-size:12px;color:var(--tx3)">항목 없음</span>'}</div>
          <div style="flex:1;min-width:0">${detailHtml}</div>
        </div>
      `}
      </div>
    </div>`;
}

let _tEditIdx=-1;

function openAddT(){
  _tEditIdx=-1;
  const cats=getCategories();
  const catOpts=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.getElementById('t-date').value='';
  document.getElementById('t-title').value='';
  document.getElementById('t-members').value='';
  document.getElementById('t-note').value='';
  document.getElementById('t-category').value='';
  const sel=document.getElementById('t-cat-sel');
  sel.innerHTML=`<option value="">직접 입력</option>${catOpts}`;
  sel.value='';
  document.getElementById('t-modal-title').textContent='지출내역 추가';
  document.getElementById('t-items-list').innerHTML='';
  _tModalItems=[];
  document.getElementById('tm').classList.add('on');
}

function editT(i){
  _tEditIdx=i;
  const t=D.tournaments[i];
  const cats=getCategories();
  const catOpts=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  const sel=document.getElementById('t-cat-sel');
  sel.innerHTML=`<option value="">직접 입력</option>${catOpts}`;
  sel.value=cats.includes(t.category||'')?t.category:'';
  document.getElementById('t-date').value=t.date||'';
  document.getElementById('t-title').value=t.title||'';
  document.getElementById('t-category').value=t.category||'';
  document.getElementById('t-members').value=t.members||'';
  document.getElementById('t-note').value=t.note||'';
  _tModalItems=[...(t.items||[])];
  renderTModalItems();
  document.getElementById('t-modal-title').textContent='지출내역 수정';
  document.getElementById('tm').classList.add('on');
}

function onCatSelChange(){
  const sel=document.getElementById('t-cat-sel');
  if(sel.value)document.getElementById('t-category').value=sel.value;
}

let _tModalItems=[];
function renderTModalItems(){
  const list=document.getElementById('t-items-list');if(!list)return;
  // 기존 행이 없으면 전체 재생성, 있으면 합계만 업데이트
  const existRows=list.querySelectorAll('.ti-row');
  if(existRows.length===_tModalItems.length&&existRows.length>0){
    // 합계만 갱신
    const total=_tModalItems.reduce((s,it)=>s+(parseInt(it.amount)||0),0);
    const tot=list.querySelector('.ti-total');
    if(tot)tot.textContent='합계: '+total.toLocaleString()+'원';
    return;
  }
  // 전체 재생성 (항목 추가/삭제 시)
  const hdr=`<div style="display:grid;grid-template-columns:1fr 90px 70px 100px 28px;gap:4px;margin-bottom:4px">
    <span style="font-size:10px;color:var(--tx2);padding:0 8px">항목명</span>
    <span style="font-size:10px;color:var(--tx2);text-align:right;padding:0 8px">단가</span>
    <span style="font-size:10px;color:var(--tx2);text-align:right;padding:0 8px">수량</span>
    <span style="font-size:10px;color:var(--tx2);text-align:right;padding:0 8px">금액</span>
    <span></span>
  </div>`;
  const rows=_tModalItems.map((it,i)=>`
    <div class="ti-row" style="display:grid;grid-template-columns:1fr 90px 70px 100px 28px;gap:4px;align-items:center;margin-bottom:6px">
      <input class="fi" value="${it.name||''}" placeholder="항목명" style="font-size:12px;padding:6px 8px" oninput="_tModalItems[${i}].name=this.value">
      <input class="fi ti-price" data-idx="${i}" value="${it.price||''}" placeholder="단가" style="font-size:12px;padding:6px 8px;text-align:right" oninput="tiCalc(${i},'price',this)">
      <input class="fi ti-qty" data-idx="${i}" value="${it.qty||''}" placeholder="수량" style="font-size:12px;padding:6px 8px;text-align:right" oninput="tiCalc(${i},'qty',this)">
      <input class="fi ti-amt" data-idx="${i}" value="${it.amount||''}" placeholder="금액" style="font-size:12px;padding:6px 8px;text-align:right" oninput="tiCalc(${i},'amt',this)">
      <button type="button" onclick="_tModalItems.splice(${i},1);renderTModalItems()" style="color:var(--r);background:none;border:none;cursor:pointer;font-size:14px;padding:0">✕</button>
    </div>`).join('');
  const total=_tModalItems.reduce((s,it)=>s+(parseInt(it.amount)||0),0);
  list.innerHTML=(_tModalItems.length?hdr+rows:'')+
    (total?`<div class="ti-total" style="text-align:right;font-size:12px;font-weight:700;color:var(--g);padding:4px 8px">합계: ${total.toLocaleString()}원</div>`:'');
}
function tiCalc(i,field,el){
  const v=parseInt(el.value.replace(/[^0-9]/g,''))||0;
  if(field==='price'){_tModalItems[i].price=v;_tModalItems[i].amount=v*(_tModalItems[i].qty||1);const aEl=document.querySelector(`.ti-amt[data-idx="${i}"]`);if(aEl)aEl.value=_tModalItems[i].amount||'';}
  else if(field==='qty'){_tModalItems[i].qty=v||1;_tModalItems[i].amount=(_tModalItems[i].price||0)*(v||1);const aEl=document.querySelector(`.ti-amt[data-idx="${i}"]`);if(aEl)aEl.value=_tModalItems[i].amount||'';}
  else{_tModalItems[i].amount=v;}
  renderTModalItems();
}

function addTModalItem(){
  _tModalItems.push({name:'',amount:0});
  renderTModalItems();
}

function delT(i){if(!confirm('삭제할까요?'))return;D.tournaments.splice(i,1);R._tItem=-1;sv();renderT();}

function selectMonthCard(ym){
  R._tSelMonth=ym;
  R._tCat=null;
  R._tItem=-1;
  R._tAllView=false;
  R._tAllYear=null;
  renderT();
  setTimeout(()=>{const el=document.getElementById('t-detail-area');if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}

function scrollMonths(dir){
  const el=document.getElementById('month-scroll-inner');
  if(!el)return;
  el.scrollBy({left:dir*200,behavior:'smooth'});
}
function toggleMonthExpand(ym,btn){
  const card=btn.closest('.month-card');
  const hidden=card.querySelector('.month-card-hidden');
  if(!hidden)return;
  const isOpen=hidden.style.display!=='none';
  hidden.style.display=isOpen?'none':'block';

function delTItem(tIdx,iIdx){
  if(!confirm('세부항목을 삭제할까요?'))return;
  D.tournaments[tIdx].items.splice(iIdx,1);
  sv();renderT();
}

function openAddTItem(tIdx){
  const name=prompt('항목명:');if(name===null)return;
  const amtStr=prompt('금액:');if(amtStr===null)return;
  const amount=parseInt(amtStr)||0;
  if(!D.tournaments[tIdx].items)D.tournaments[tIdx].items=[];
  D.tournaments[tIdx].items.push({name,amount});
  sv();renderT();
}

function saveT(){
  const date=document.getElementById('t-date').value;
  const title=document.getElementById('t-title').value.trim();
  const category=document.getElementById('t-category').value.trim()||document.getElementById('t-cat-sel').value||'기타';
  const members=document.getElementById('t-members').value.trim();
  const note=document.getElementById('t-note').value.trim();
  if(!date||!title){alert('날짜와 명칭은 필수입니다.');return;}
  // 항목은 이미 oninput에서 실시간 동기화됨
  const obj={date,title,category,members,note,items:[..._tModalItems]};
  if(!D.tournaments)D.tournaments=[];
  if(_tEditIdx>=0)D.tournaments[_tEditIdx]=obj;
  else{D.tournaments.push(obj);R._tItem=D.tournaments.length-1;}
  D.tournaments.sort((a,b)=>a.date.localeCompare(b.date));
  sv();closeOv('tm');renderT();
}

function shareItem(idx){
  const t=D.tournaments[idx];if(!t)return;
  const url=location.href.split('?')[0]+'?view=monthly&item='+idx;
  navigator.clipboard.writeText(url).then(()=>{showShareToast('링크 복사됨! 붙여넣기하면 해당 내역이 바로 열립니다');}).catch(()=>{prompt('아래 URL을 복사하세요:',url);});
}
function shareMonth(ym){
  const url=location.href.split('?')[0]+'?view=monthly&month='+ym;
  navigator.clipboard.writeText(url).then(()=>{showShareToast('링크 복사됨! 해당 월 전체 내역이 열립니다');}).catch(()=>{prompt('아래 URL을 복사하세요:',url);});
}
function showShareToast(msg){
  let t=document.getElementById('share-toast');
  if(!t){t=document.createElement('div');t.id='share-toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e1b4b;color:white;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>t.style.opacity='0',2500);
}

function checkPublicView(){
  const params=new URLSearchParams(location.search);
  if(params.get('view')==='monthly'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='none';
    const pub=document.getElementById('pub-monthly');
    pub.style.display='block';
    const itemIdx=params.get('item')!=null?parseInt(params.get('item')):null;
    const filterMonth=params.get('month')||null;
    if(db){
      db.ref('club/tournaments').on('value',snap=>{
        const ts=snap.val()||[];
        const arr=Array.isArray(ts)?ts:Object.values(ts);
        renderPublicT(arr,itemIdx,filterMonth);
      });
    } else {
      // Firebase 없으면 localStorage에서
      try{
        const r=localStorage.getItem('bm_club_v2');
        const data=r?JSON.parse(r):null;
        const arr=Array.isArray(data?.tournaments)?data.tournaments:[];
        renderPublicT(arr,itemIdx,filterMonth);
      }catch(e){renderPublicT([],itemIdx,filterMonth);}
    }
  }
}

function renderPublicT(ts,focusIdx,filterMonth){
  const el=document.getElementById('pub-monthly');
  const base=location.href.split('?')[0];
  // 공유된 범위 판별
  const isSingleItem=focusIdx!=null&&!isNaN(focusIdx)&&ts[focusIdx];
  const isMonthFilter=!!filterMonth&&!isSingleItem;
  // 표시할 항목들
  let displayTs=ts;
  let pageTitle='지출내역';
  let originBtn='';
  if(isSingleItem){
    displayTs=[ts[focusIdx]];
    const t=ts[focusIdx];
    const[y,m]=t.date.substring(0,7).split('-');
    pageTitle=`${t.title||t.date} 지출내역`;
    originBtn=`<button onclick="showAllPublicT()" style="padding:6px 14px;border-radius:8px;border:1px solid #c7d2fe;background:white;color:#4f46e5;font-size:12px;cursor:pointer;font-family:inherit">전체보기</button>
    <button onclick="backToOriginPublicT()" id="origin-btn" style="display:none;padding:6px 14px;border-radius:8px;border:1px solid #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:12px;cursor:pointer;font-family:inherit">📌 ${pageTitle}로 돌아가기</button>`;
  } else if(isMonthFilter){
    const[y,m]=filterMonth.split('-');
    pageTitle=`${y}년 ${parseInt(m)}월 지출내역`;

  // 기존 부분납 구간 목록 렌더
  const groups={};// payKey → {missKeys[], payKey}
  if(m?.lateKeys){Object.entries(m.lateKeys).forEach(([mk,pk])=>{if(!groups[pk])groups[pk]={payKey:pk,missKeys:[]};groups[pk].missKeys.push(mk);});}
  const AM=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  const ML={'2026-01':'1월','2026-02':'2월','2026-03':'3월','2026-04':'4월','2026-05':'5월','2026-06':'6월','2026-07':'7월','2026-08':'8월','2026-09':'9월','2026-10':'10월','2026-11':'11월','2026-12':'12월'};
  let groupHtml='';
  Object.values(groups).forEach((g,i)=>{
    const missChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:pointer;background:#f5f3ff;border-radius:5px;padding:3px 7px;font-size:11px"><input type="checkbox" class="pg-miss" data-gidx="${i}" value="${k}" ${g.missKeys.includes(k)?'checked':''} onchange="onMissChange(this)"> ${ML[k]}</label>`).join('');
    const payChks=AM.map(k=>{const act=g.missKeys.includes(k);const chk=g.payKey===k?'checked':'';const sty=act?'cursor:pointer;background:#eff6ff;':'cursor:not-allowed;background:#f1f5f9;opacity:0.35;';return`<label style="display:flex;align-items:center;gap:3px;${sty}border-radius:5px;padding:3px 7px;font-size:11px"><input type="radio" name="pg-pay-${i}" class="pg-pay" data-gidx="${i}" value="${k}" ${chk} ${act?'':'disabled'}> ${ML[k]}</label>`;}).join('');
    const defAmt=g.payAmt||(()=>{const base=D.members.find(x=>x.id===PMI)?.memberFee||(D.months[0]?.fee||5000);return base*g.missKeys.length;})();
    groupHtml+=`<div class="partial-group" data-gidx="${i}" style="border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;background:#fafafa">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:var(--tx2)">부분납 구간 ${i+1}</span><button type="button" onclick="removePartialGroup(${i})" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;line-height:1">✕</button></div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 처리할 달</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${missChks}</div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 표기 (1개)</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${payChks}</div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 금액 (원)</div><input type="number" class="fi pg-amt" value="${defAmt}" oninput="this.dataset.userEdited='1'" placeholder="납부 금액" style="font-size:12px;padding:6px 8px;width:100%;box-sizing:border-box">
    </div>`;
  });
  h=`<div id="partial-groups">${groupHtml}</div><div class="info-box" style="font-size:11px;margin-top:4px">납부 처리할 달 중 하나를 납부 표기로 선택하세요. 앞이면 선납, 뒤면 후납, 중간이면 부분납으로 표기돼요.</div>`;
}else{
  if(addRow)addRow.style.display='none';
  h=`<div class="info-box">매월 개별 납부로 처리됩니다.</div>`;
}
document.getElementById('pl-detail').innerHTML=h;}
function addPartial(){
  const AM=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  const ML={'2026-01':'1월','2026-02':'2월','2026-03':'3월','2026-04':'4월','2026-05':'5월','2026-06':'6월','2026-07':'7월','2026-08':'8월','2026-09':'9월','2026-10':'10월','2026-11':'11월','2026-12':'12월'};
  const pg=document.getElementById('partial-groups');if(!pg)return;
  const i=pg.querySelectorAll('.partial-group').length;
  const missChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:pointer;background:#f5f3ff;border-radius:5px;padding:3px 7px;font-size:11px"><input type="checkbox" class="pg-miss" data-gidx="${i}" value="${k}" onchange="onMissChange(this)"> ${ML[k]}</label>`).join('');
  const payChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:not-allowed;background:#f1f5f9;opacity:0.35;border-radius:5px;padding:3px 7px;font-size:11px"><input type="radio" name="pg-pay-${i}" class="pg-pay" data-gidx="${i}" value="${k}" disabled> ${ML[k]}</label>`).join('');
  const div=document.createElement('div');
  div.className='partial-group';div.dataset.gidx=i;
  div.style.cssText='border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;background:#fafafa';
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:var(--tx2)">부분납 구간 ${i+1}</span><button type="button" onclick="this.closest('.partial-group').remove();renumberGroups()" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;line-height:1">✕</button></div><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 처리할 달</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${missChks}</div><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 표기 (1개)</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${payChks}</div>\n      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 금액 (원)</div><input type="number" class="fi pg-amt" placeholder="납부 금액" oninput="this.dataset.userEdited='1'" style="font-size:12px;padding:6px 8px;width:100%;box-sizing:border-box">`;
  pg.appendChild(div);
}
function removePartialGroup(idx){
  const pg=document.getElementById('partial-groups');if(!pg)return;
  const groups=pg.querySelectorAll('.partial-group');
  if(groups[idx])groups[idx].remove();
  renumberGroups();
}
function onMissChange(el){
  const g=el.closest('.partial-group');if(!g)return;
  const missKeys=[...g.querySelectorAll('.pg-miss:checked')].map(e=>e.value);
  // 납부 표기 라디오 활성화/비활성화
  g.querySelectorAll('.pg-pay').forEach(r=>{
    const act=missKeys.includes(r.value);
    r.disabled=!act;
    const lbl=r.closest('label');
    if(lbl){lbl.style.cursor=act?'pointer':'not-allowed';lbl.style.opacity=act?'1':'0.35';lbl.style.background=act?'#eff6ff':'#f1f5f9';}
    if(!act&&r.checked){r.checked=false;}
  });
  // 기본: 마지막 체크된 달로 자동 선택
  if(missKeys.length){const lastK=missKeys.sort()[missKeys.length-1];const r=g.querySelector(`.pg-pay[value="${lastK}"]`);if(r&&!g.querySelector('.pg-pay:checked'))r.checked=true;}  const amtEl=g.querySelector('.pg-amt');  if(amtEl){const base=D.members.find(x=>x.id===PMI)?.memberFee||(D.months[0]?.fee||5000);  amtEl.placeholder=`납부 금액 (기본 ${(base*missKeys.length).toLocaleString()}원)`;  if(!amtEl.dataset.userEdited)amtEl.value=missKeys.length?base*missKeys.length:'';}
}
function renumberGroups(){
  const pg=document.getElementById('partial-groups');if(!pg)return;
  pg.querySelectorAll('.partial-group').forEach((g,i)=>{
    g.dataset.gidx=i;
    const title=g.querySelector('span');if(title)title.textContent=`부분납 구간 ${i+1}`;
    g.querySelectorAll('.pg-miss').forEach(el=>el.dataset.gidx=i);
    g.querySelectorAll('.pg-pay').forEach(el=>{el.dataset.gidx=i;el.name=`pg-pay-${i}`;});
    const xBtn=g.querySelector('button');if(xBtn)xBtn.setAttribute('onclick',`removePartialGroup(${i})`);
  });
}

function rRow(r,i){const lN=!r.late?'#4f46e5':'var(--bd)',lY=r.late?'#4f46e5':'var(--bd)';const bN=!r.late?'#eef2ff':'white',bY=r.late?'#eef2ff':'white';const cN=!r.late?'#4f46e5':'var(--tx2)',cY=r.late?'#4f46e5':'var(--tx2)';return`<div class="range-row"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--tx2)">구간 ${i+1}</span><button type="button" onclick="rmRange(this)" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:13px">✕</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">시작 월</label><input class="fi pr-s" type="month" value="${r.start||''}"></div><div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">종료 월</label><input class="fi pr-e" type="month" value="${r.end||''}"></div></div><div style="margin-bottom:8px"><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">납부 금액 (원)</label><input class="fi pr-a" type="number" value="${r.amount||''}" placeholder="예: 15000"></div><div style="display:flex;gap:6px"><button type="button" onclick="tgLate(this,false)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lN};background:${bN};color:${cN};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">선납</button><button type="button" onclick="tgLate(this,true)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lY};background:${bY};color:${cY};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">후납</button></div><input type="hidden" class="pr-late" value="${r.late||false}"></div>`;}
function addRange(){const c=document.getElementById('plan-ranges');if(!c)return;const d=document.createElement('div');d.innerHTML=rRow({start:'',end:'',amount:'',late:false},c.querySelectorAll('.range-row').length);c.appendChild(d.firstChild);}
function rmRange(btn){btn.closest('.range-row').remove();document.querySelectorAll('.range-row').forEach((r,i)=>{const l=r.querySelector('span');if(l)l.textContent='구간 '+(i+1);});}
function tgLate(btn,val){const row=btn.closest('.range-row');row.querySelector('.pr-late').value=val;row.querySelectorAll('button[onclick*="tgLate"]').forEach(b=>{const on=b===btn;b.style.borderColor=on?'#4f46e5':'var(--bd)';b.style.background=on?'#eef2ff':'white';b.style.color=on?'#4f46e5':'var(--tx2)';});}
function savePlan(){const m=D.members.find(x=>x.id===PMI);if(!m)return;
if(PT==='후납'){
  // 기존 lateKeys/pay/amt 초기화
  if(m.lateKeys){Object.keys(m.lateKeys).forEach(k=>{delete m.pay[k];});Object.values(m.lateKeys).forEach(k=>{if(m.amt)delete m.amt[k];delete m.pay[k];});}
  m.lateKeys={};if(!m.amt)m.amt={};
  const groups=document.querySelectorAll('.partial-group');
  if(!groups.length){sv();closeOv('plm');render();return;}
  let valid=true;
  groups.forEach((g,i)=>{
    const missKeys=[...g.querySelectorAll('.pg-miss:checked')].map(el=>el.value);
    const payKey=g.querySelector('.pg-pay:checked')?.value||'';
    if(!missKeys.length||!payKey){alert(`구간 ${i+1}: 납부 처리할 달과 납부 표기 달을 선택해주세요.`);valid=false;return;}
    missKeys.filter(k=>k!==payKey).forEach(k=>{m.lateKeys[k]=payKey;m.pay[k]=true;});
    m.pay[payKey]=true;
    // 선납이면 payKey가 missKeys 중 가장 앞, 후납이면 가장 뒤 → amt는 후납 기준
    const allKeys=[...missKeys,payKey].filter((v,i,a)=>a.indexOf(v)===i).sort();
    const isLate=payKey===allKeys[allKeys.length-1];
    const pgAmt=parseInt(g.querySelector('.pg-amt')?.value)||0;    const baseAmt=m.memberFee||(D.months.find(x=>x.key===payKey)?.fee||5000);    const autoAmt=isLate?baseAmt*(missKeys.length+1):baseAmt*allKeys.length;    m.amt[payKey]=pgAmt||autoAmt;
  });
  if(!valid)return;
  sv();closeOv('plm');render();return;
}
// 월납
if(m.plan&&m.plan.type==='선납'){const oldRanges=m.plan.ranges||[{start:m.plan.start,end:m.plan.end}];oldRanges.forEach(r=>{if(!r.start||!r.end)return;let d=new Date(r.start+'-01'),ed=new Date(r.end+'-01');while(d<=ed){const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!m.amt||m.amt[k]==null)delete m.pay[k];d=new Date(d.getFullYear(),d.getMonth()+1,1);}});}
m.plan={type:'월납'};sv();closeOv('plm');render();}
function openWM(id){WMI=id;const m=D.members.find(x=>x.id===id);if(!m)return;document.getElementById('wd-info').textContent=`'${m.name}' 회원을 탈퇴 처리합니다.`;document.getElementById('wdd').value=new Date().toISOString().substring(0,10);document.getElementById('wdd').disabled=false;document.getElementById('wdd-unk').checked=false;document.getElementById('wdnote').value='';const act=document.getElementById('wd-action');act.textContent='탈퇴 처리';act.onclick=doWithdraw;document.getElementById('wdm').classList.add('on');}
function openEditWd(id){const m=D.withdrawn.find(x=>x.id===id);if(!m)return;WMI=id;document.getElementById('wd-info').textContent=`'${m.name}' 탈퇴 정보 수정`;document.getElementById('wdd-unk').checked=!!m.wdUnknown;document.getElementById('wdd').value=m.wdate||'';document.getElementById('wdd').disabled=!!m.wdUnknown;document.getElementById('wdnote').value=m.wdNote||'';const act=document.getElementById('wd-action');act.textContent='수정 저장';act.onclick=()=>{const tgt=D.withdrawn.find(x=>x.id===WMI);if(!tgt)return;tgt.wdUnknown=document.getElementById('wdd-unk').checked;tgt.wdate=tgt.wdUnknown?null:(document.getElementById('wdd').value||null);tgt.wdNote=document.getElementById('wdnote').value.trim();sv();closeOv('wdm');renderW();};document.getElementById('wdm').classList.add('on');}
function doWithdraw(){const m=D.members.find(x=>x.id===WMI);if(!m)return;m.wdUnknown=document.getElementById('wdd-unk').checked;m.wdate=m.wdUnknown?null:(document.getElementById('wdd').value||null);m.wdNote=document.getElementById('wdnote').value.trim();D.members=D.members.filter(x=>x.id!==WMI);D.withdrawn.push(m);sv();closeOv('wdm');render();}
function restoreM(id){const i=D.withdrawn.findIndex(x=>x.id===id);if(i===-1)return;const m=D.withdrawn.splice(i,1)[0];delete m.wdate;D.members.push(m);sv();renderW();}
function permDel(id){if(!confirm('완전히 삭제합니다. 복구 불가합니다.'))return;D.withdrawn=D.withdrawn.filter(x=>x.id!==id);sv();renderW();}
function openMoM(){const years=[...new Set(D.months.map(m=>m.key.substring(0,4)))].sort();const nextY=parseInt(years[years.length-1]||new Date().getFullYear())+1;document.getElementById('moy').value=nextY;document.getElementById('mo2').value='01';document.getElementById('mom').classList.add('on');}
function openMoM2(){const ay=String(R.activeYear||new Date().getFullYear());const existing=D.months.filter(m=>m.key.startsWith(ay)).map(m=>parseInt(m.key.substring(5)));const nextMo=existing.length?Math.max(...existing)+1:1;if(nextMo>12){alert(ay+'년 12월까지 모두 추가됐습니다.');return;}document.getElementById('moy').value=ay;document.getElementById('mo2').value=String(nextMo).padStart(2,'0');document.getElementById('mom').classList.add('on');}
function saveMonth(){const y=document.getElementById('moy').value,mo=document.getElementById('mo2').value;const fee=parseInt(document.getElementById('mofee').value)||5000,key=`${y}-${mo}`;if(D.months.find(x=>x.key===key)){alert('이미 추가된 월입니다.');return;}D.months.push({key,label:`${parseInt(mo)}월`,fee});D.months.sort((a,b)=>a.key.localeCompare(b.key));D.members.forEach(mb=>{if(!mb.plan||mb.plan.type!=='선납')return;const ranges=mb.plan.ranges||[{start:mb.plan.start,end:mb.plan.end}];if(ranges.some(r=>key>=r.start&&key<=r.end))mb.pay[key]=true;});R.cm=key;R.activeYear=parseInt(key.substring(0,4));sv();closeOv('mom');render();}
function syncHeadWidths(){const ht=document.getElementById('head-tbl'),bt=document.getElementById('body-tbl');if(!ht||!bt)return;const bRow=bt.querySelector('tr');if(!bRow)return;const bCells=bRow.querySelectorAll('td');const hCells1=ht.querySelectorAll('thead tr:first-child th');const hCells2=ht.querySelectorAll('thead tr:last-child th');bCells.forEach((td,i)=>{const w=td.getBoundingClientRect().width+'px';if(hCells1[i]){hCells1[i].style.width=w;hCells1[i].style.minWidth=w;}if(hCells2[i]){hCells2[i].style.width=w;hCells2[i].style.minWidth=w;}});ht.style.width=bt.getBoundingClientRect().width+'px';}
function closeOv(id){document.getElementById(id).classList.remove('on');if(id==='mm'||id==='plm'){ACTIVE_ID=null;render();}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')['mm','plm','wdm','mom','tm'].forEach(closeOv);});
document.querySelectorAll('.ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('on');}));
</script>
