<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADMAX 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--sf:#fff;--sf2:#f1f3f7;--bd:#e4e7ef;
  --tx:#1a1d2e;--tx2:#6b7280;--tx3:#9ca3af;
  --g:#16a34a;--g2:#dcfce7;--g3:#bbf7d0;
  --r:#dc2626;--r2:#fee2e2;--r3:#fecaca;
  --b:#2563eb;--b2:#dbeafe;
  --yw:#d97706;--yw2:#fef3c7;--yw3:#fde68a;
  --adm:#7c3aed;--adm2:#ede9fe;
  --radius:10px;--radius2:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%)}
.lc{background:white;border-radius:20px;padding:36px 30px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.li{font-size:52px;margin-bottom:10px;display:block}
.lt{font-size:22px;font-weight:700;margin-bottom:4px}
.ls{font-size:13px;color:#6b7280;margin-bottom:24px}
.linp{width:100%;border:1.5px solid #e4e7ef;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.linp:focus{border-color:#4f46e5}
.lbtn{width:100%;margin-top:10px;background:#4f46e5;color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.lbtn:hover{background:#4338ca}
.lerr{color:#dc2626;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.hdr{background:#1e1b4b;color:white;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:18px;font-weight:900;letter-spacing:-.5px}
.hdr-sub{font-size:11px;opacity:.6}
.hdr-r{display:flex;align-items:center;gap:8px}
.vtab{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.2);font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;background:transparent;font-family:inherit}
.vtab.on{background:rgba(255,255,255,.15);color:white;border-color:rgba(255,255,255,.4);font-weight:500}
.logbtn{padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.15);font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;background:transparent;font-family:inherit}
.main{padding:14px 14px 80px;max-width:1400px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr)}}
.sc{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:10px 12px}
.sl{font-size:10px;color:var(--tx2);margin-bottom:3px}
.sv{font-size:20px;font-weight:700;line-height:1}
.sv.g{color:var(--g)}.sv.r{color:var(--r)}.sv.b{color:var(--b)}.sv.yw{color:var(--yw)}
.mtabs{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.mtab{padding:5px 14px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;white-space:nowrap}
.mtab.on{background:#1e1b4b;color:white;border-color:#1e1b4b;font-weight:700}
.mtab-add{padding:5px 10px;border:1px dashed var(--bd);border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:var(--tx3);font-family:inherit}
.mtab-add:hover{border-color:var(--g);color:var(--g)}
.toolbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.srch{flex:1;min-width:140px;background:white;border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--tx);outline:none}
.srch:focus{border-color:#4f46e5}
.tbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;white-space:nowrap}
.tbtn.on{background:var(--yw2);border-color:var(--yw3);color:var(--yw);font-weight:500}
.abtn{padding:7px 16px;border-radius:8px;background:var(--g);color:white;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.abtn:hover{background:#15803d}
.mode-seg{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden;flex-shrink:0}
.mseg{padding:6px 12px;font-size:12px;font-family:inherit;background:white;color:var(--tx2);border:none;border-right:1px solid var(--bd);cursor:pointer;white-space:nowrap}
.mseg:last-child{border-right:none}
.mseg.on{background:#1e1b4b;color:white;font-weight:600}
.tw-wrap{border:1px solid var(--bd);border-radius:var(--radius2);overflow-x:auto;margin-bottom:12px;background:white}
.tw-head{border:1px solid var(--bd);border-bottom:none;border-radius:var(--radius2) var(--radius2) 0 0;overflow-x:hidden;background:white;position:sticky;top:52px;z-index:20}
.tw-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--radius2) var(--radius2);overflow-x:auto;margin-bottom:12px;background:white}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{position:sticky;z-index:10;background:var(--sf2)}
thead tr:first-child th{top:0}
thead tr:nth-child(2) th{top:40px}
th{padding:9px 10px;font-size:11px;font-weight:600;color:var(--tx2);border-bottom:1px solid var(--bd);border-right:1px solid #eaecf0;text-align:center;white-space:nowrap}
th:last-child{border-right:none}
th:first-child{text-align:left}
.th-tot th{background:#f7f8fc;font-size:12px;font-weight:700;color:var(--g)}
.th-tot th:first-child{color:var(--tx2);font-weight:500}
.th-mon th{background:var(--sf2)}
th.clickable{cursor:pointer}
th.clickable:hover{background:#e8eaf0}
.th-cur{background:#dbeafe!important;color:#1e40af!important}
td{padding:0;height:38px;font-size:13px;border-bottom:1px solid #f0f2f7;border-right:1px solid #eaecf0;text-align:center;vertical-align:middle}
td:last-child{border-right:none}
td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover:not(.divr):not(.sectr):not(.famgapr) td{background:#f5f7ff}
tbody tr:hover:not(.divr):not(.sectr):not(.famgapr){outline:1.5px solid #c7d2fe;outline-offset:-1px}
.divr td{background:#f0f2f7;font-size:10px;color:var(--tx3);text-align:center;padding:4px;letter-spacing:4px;font-weight:600;height:26px}
.divr:hover td{background:#f0f2f7!important}
.sectr td{font-size:11px;font-weight:700;padding:6px 10px;letter-spacing:.5px;border-bottom:1px solid var(--bd);text-align:left;height:28px}
.sectr:hover td{background:inherit!important}
.famgapr td{height:4px;background:var(--bg);border:none;padding:0}
.famgapr:hover td{background:var(--bg)!important}
.row-un td{background:#fff9f9}
.row-un:hover td{background:#fff3f3!important}
.row-pr td{background:#fffdf5}
.row-pr:hover td{background:#fffbeb!important}
.row-adm td{background:#faf9ff}
.row-fam td{background:#f9fffe}
.row-fam:hover td{background:#f0fefa!important}
.row-famhead td{background:#f0fdf8}
.row-famhead:hover td{background:#e6faf4!important}
tr.row-active{outline:1.5px solid #4f46e5}
.name-cell{display:flex;align-items:center;gap:6px;height:100%;padding:0 10px;white-space:nowrap}
.name-sub{padding-left:2px;display:inline-flex;align-items:center;gap:4px;color:var(--tx2)}
.name-sub::before{content:'└';color:var(--tx3);font-size:10px}
.rel-badge{display:inline-block;padding:1px 5px;border-radius:20px;font-size:9px;font-weight:700;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;margin-left:2px}
.rb{display:inline-block;padding:2px 6px;border-radius:20px;font-size:9px;font-weight:700;margin-left:2px;vertical-align:middle}
.rb-adm{background:var(--adm2);color:var(--adm)}
.rb-minor{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.gb{display:inline-block;padding:1px 5px;border-radius:20px;font-size:10px;font-weight:600;flex-shrink:0}
.gm{background:var(--b2);color:var(--b)}
.gf{background:#fce7f3;color:#be185d}
.pcell{cursor:pointer;position:relative;overflow:visible}
.td-cur{background:#f0f7ff!important}
.pv{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:7px;font-size:12px;font-weight:600;min-width:52px;white-space:nowrap}
.pv-ok{background:var(--g2);color:#166634}
.pv-ok:hover{background:var(--g3)}
.pv-no{background:var(--r2);color:#991b1b;border:1px dashed var(--r3)}
.pv-no:hover{background:var(--r3)}
.pv-dash{color:var(--tx3);font-size:15px;line-height:1}
.plb{display:inline-block;padding:0 4px;border-radius:10px;font-size:8px;font-weight:800;background:#fde68a;color:#78350f;letter-spacing:.3px;vertical-align:middle}
.plb-late{display:inline-block;padding:0 4px;border-radius:10px;font-size:8px;font-weight:800;background:#7c3aed;color:#fff;letter-spacing:.3px;vertical-align:middle}.plb-part{display:inline-block;padding:0 4px;border-radius:10px;font-size:8px;font-weight:800;background:#64748b;color:#fff;letter-spacing:.3px;vertical-align:middle}
.pill-s,.pill-m,.pill-e,.pill-solo{position:absolute;top:5px;bottom:5px;background:var(--yw2);color:#92400e;display:flex;align-items:center;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none}
.pill-s{left:5px;right:-1px;border-radius:7px 0 0 7px;padding-left:8px;gap:4px}
.pill-m{left:-1px;right:-1px;border-radius:0;justify-content:center}
.pill-e{left:-1px;right:5px;border-radius:0 7px 7px 0;justify-content:center}
.pill-solo{left:5px;right:5px;border-radius:7px;padding:0 8px;gap:4px}
.pill-late-s,.pill-late-m,.pill-late-e,.pill-late-solo{position:absolute;top:5px;bottom:5px;background:#dbeafe;color:#1e40af;display:flex;align-items:center;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none}
.pill-late-s{left:5px;right:-1px;border-radius:7px 0 0 7px;justify-content:center;gap:4px}.pill-pre-s,.pill-pre-m,.pill-pre-e,.pill-pre-solo{position:absolute;top:5px;bottom:5px;background:#fef9c3;color:#854d0e;display:flex;align-items:center;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none}.pill-pre-solo{left:5px;right:5px;border-radius:7px;padding:0 8px;gap:4px}.pill-pre-s{left:5px;right:-1px;border-radius:7px 0 0 7px;justify-content:center;gap:4px}.pill-pre-m{left:-1px;right:-1px;border-radius:0;justify-content:center}.pill-pre-e{left:-1px;right:5px;border-radius:0 7px 7px 0;justify-content:center;padding-right:8px;gap:4px}.pill-part-s,.pill-part-m,.pill-part-e,.pill-part-solo,.pill-part-pay,.pill-part-tail{position:absolute;top:5px;bottom:5px;background:#e2e8f0;color:#475569;display:flex;align-items:center;font-size:11px;font-weight:600;white-space:nowrap;pointer-events:none}.pill-part-solo{left:5px;right:5px;border-radius:7px;padding:0 8px;justify-content:center;gap:4px}.pill-part-s{left:5px;right:-1px;border-radius:7px 0 0 7px;justify-content:center;gap:4px}.pill-part-m{left:-1px;right:-1px;border-radius:0;justify-content:center}.pill-part-e{left:-1px;right:5px;border-radius:0 7px 7px 0;justify-content:center;padding-right:8px;gap:4px}.pill-part-pay{left:-1px;right:-1px;border-radius:0;justify-content:center;gap:4px}.pill-part-tail{left:-1px;right:5px;border-radius:0 7px 7px 0;justify-content:center}
.pill-late-m{left:-1px;right:-1px;border-radius:0;justify-content:center}
.pill-late-e{left:-1px;right:5px;border-radius:0 7px 7px 0;justify-content:center;padding-right:8px;gap:4px}
.pill-late-solo{left:5px;right:5px;border-radius:7px;padding:0 8px;gap:4px}
.col-gap-th{width:20px!important;min-width:20px!important;padding:0!important;cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:var(--b);border-right:1px solid #eaecf0}
.col-gap-th:hover{background:#dbeafe!important}
.col-gap-td{width:20px!important;min-width:20px!important;padding:0!important;border-right:1px solid #f0f2f7}
.ubox{background:white;border:1px solid var(--bd);border-radius:var(--radius2);padding:14px;margin-bottom:10px}
.ut{font-size:12px;font-weight:700;color:var(--yw);margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{background:var(--r2);border:1px solid var(--r3);color:var(--r);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500}
.ok-chip{color:var(--g);font-size:13px;font-weight:500}
.kbox{background:#f8f9fb;border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:12px;line-height:1.8;color:var(--tx);white-space:pre-wrap;min-height:48px;word-break:break-all;outline:none}
.kbox[contenteditable=true]{border-color:#4f46e5}
.krow{display:flex;gap:7px;margin-top:8px;align-items:center}
.kbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;font-weight:500}
.kbtn:hover{border-color:#4f46e5;color:#4f46e5}
.kbtn.copied{background:var(--g2);border-color:var(--g3);color:var(--g)}
.knote{font-size:11px;color:var(--tx3);flex:1}
.wcard{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:12px 14px;margin-bottom:7px}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.wn{font-weight:600;font-size:14px}
.wd{font-size:11px;color:var(--tx2);margin-top:2px}
.wnote{font-size:12px;color:var(--tx2);background:var(--bg);border-radius:7px;padding:6px 10px;margin-top:8px;border-left:2px solid var(--bd);white-space:pre-wrap}
.wbtns{display:flex;gap:6px;flex-shrink:0}
.wbtn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);font-size:11px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;white-space:nowrap}
.wbtn.restore:hover{border-color:var(--g);color:var(--g)}
.wbtn.del:hover{border-color:var(--r);color:var(--r)}
.w-stats{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.w-stat{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:8px 14px;font-size:12px;color:var(--tx2)}
.w-stat strong{color:var(--tx);font-weight:700}
.ov{display:none;position:fixed;inset:0;background:rgba(15,10,40,.55);z-index:200;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:480px){.ov{align-items:center;padding:20px}}
.ov.on{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:16px;padding:22px 20px}}
.mttl{font-size:16px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:#4f46e5;background:white}
select.fi{cursor:pointer}
.sdiv{height:1px;background:var(--bd);margin:14px 0}
.sttl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:11px;border-radius:9px;border:1.5px solid var(--bd);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.mpri{background:#1e1b4b;color:white;border-color:#1e1b4b}
.mpri:hover{background:#312e81}
.mcan{background:var(--sf2);color:var(--tx2)}
.mcan:hover{background:var(--bd)}
.mdng{background:var(--r);color:white;border-color:var(--r);flex:0;padding:11px 16px}
.mdng:hover{background:#b91c1c}
.info-box{background:var(--sf2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--tx2);line-height:1.6}
.ptabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bd);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:white;color:var(--tx2);text-align:center}
.ptab.on{background:#fef3c7;border-color:#fde68a;color:#92400e}
.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-size:14px}
.fab{display:none;position:fixed;bottom:20px;right:16px;z-index:40;background:#1e1b4b;color:white;border:none;border-radius:50px;padding:13px 20px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(30,27,75,.35)}
@media(max-width:500px){.fab{display:flex;align-items:center;gap:6px}.abtn{display:none}}
.range-row{background:#f8f9fb;border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px}
</style>
</head>
<body>
<div id="login">
  <div class="lc">
    <span class="li">🏸</span>
    <div class="lt">BADMAX</div>
    <div class="ls">회원관리 (운영진 전용)</div>
    <input class="linp" type="password" id="pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">로그인</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>
<div id="app">
  <div class="hdr">
    <div><div class="hdr-logo">BADMAX</div><div class="hdr-sub">회원관리 시스템</div></div>
    <div class="hdr-r">
      <div id="sync-dot" style="display:none;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6)">
        <span id="sync-icon" style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block"></span>
        <span id="sync-txt">실시간 연결됨</span>
      </div>
      <button class="vtab on" id="vt-m" onclick="setView('m')">회원목록</button>
      <button class="vtab" id="vt-w" onclick="setView('w')">탈퇴회원</button>
      <button class="logbtn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div id="v-m">
      <div id="stats" class="stats"></div>
      <div id="mtabs" class="mtabs"></div>
      <div class="toolbar">
        <input class="srch" id="srch" placeholder="🔍  이름 검색..." oninput="R.q=this.value;render()">
        <button class="tbtn" id="ubtn" onclick="R.fu=!R.fu;render()">⚠ 미납자만</button>
        <div class="mode-seg">
          <button class="mseg on" id="ms-def" onclick="setMode('def')">기본</button>
          <button class="mseg" id="ms-alpha" onclick="setMode('alpha')">가나다순</button>
          <button class="mseg" id="ms-fam" onclick="setMode('fam')">가족구분</button>
        </div>
        <button class="abtn" onclick="openMM()">+ 회원 추가</button>
      </div>
      <div class="tw-head" id="tw-head"><table id="head-tbl" style="width:100%;border-collapse:collapse;table-layout:fixed"><thead id="th"></thead></table></div>
      <div class="tw-body" id="tw-body"><table id="body-tbl" style="width:100%;border-collapse:collapse;table-layout:fixed"><tbody id="tb"></tbody></table></div>
      <div id="ubox" class="ubox"></div>
    </div>
    <div id="v-w" style="display:none"><div id="wlist"></div></div>
  </div>
</div>
<button class="fab" onclick="openMM()">+ 회원 추가</button>
<div class="ov" id="mm"><div class="modal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

  // 기존 부분납 구간 목록 렌더
  const groups={};// payKey → {missKeys[], payKey}
  if(m?.lateKeys){Object.entries(m.lateKeys).forEach(([mk,pk])=>{if(!groups[pk])groups[pk]={payKey:pk,missKeys:[]};groups[pk].missKeys.push(mk);});}
  const AM=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  const ML={'2026-01':'1월','2026-02':'2월','2026-03':'3월','2026-04':'4월','2026-05':'5월','2026-06':'6월','2026-07':'7월','2026-08':'8월','2026-09':'9월','2026-10':'10월','2026-11':'11월','2026-12':'12월'};
  let groupHtml='';
  Object.values(groups).forEach((g,i)=>{
    const missChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:pointer;background:#f5f3ff;border-radius:5px;padding:3px 7px;font-size:11px"><input type="checkbox" class="pg-miss" data-gidx="${i}" value="${k}" ${g.missKeys.includes(k)?'checked':''} onchange="onMissChange(this)"> ${ML[k]}</label>`).join('');
    const payChks=AM.map(k=>{const act=g.missKeys.includes(k);const chk=g.payKey===k?'checked':'';const sty=act?'cursor:pointer;background:#eff6ff;':'cursor:not-allowed;background:#f1f5f9;opacity:0.35;';return`<label style="display:flex;align-items:center;gap:3px;${sty}border-radius:5px;padding:3px 7px;font-size:11px"><input type="radio" name="pg-pay-${i}" class="pg-pay" data-gidx="${i}" value="${k}" ${chk} ${act?'':'disabled'}> ${ML[k]}</label>`;}).join('');
    const defAmt=g.payAmt||(()=>{const base=D.members.find(x=>x.id===PMI)?.memberFee||(D.months[0]?.fee||5000);return base*g.missKeys.length;})();
    groupHtml+=`<div class="partial-group" data-gidx="${i}" style="border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;background:#fafafa">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:var(--tx2)">부분납 구간 ${i+1}</span><button type="button" onclick="removePartialGroup(${i})" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;line-height:1">✕</button></div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 처리할 달</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${missChks}</div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 표기 (1개)</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${payChks}</div>
      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 금액 (원)</div><input type="number" class="fi pg-amt" value="${defAmt}" oninput="this.dataset.userEdited='1'" placeholder="납부 금액" style="font-size:12px;padding:6px 8px;width:100%;box-sizing:border-box">
    </div>`;
  });
  h=`<div id="partial-groups">${groupHtml}</div><div class="info-box" style="font-size:11px;margin-top:4px">납부 처리할 달 중 하나를 납부 표기로 선택하세요. 앞이면 선납, 뒤면 후납, 중간이면 부분납으로 표기돼요.</div>`;
}else{
  if(addRow)addRow.style.display='none';
  h=`<div class="info-box">매월 개별 납부로 처리됩니다.</div>`;
}
document.getElementById('pl-detail').innerHTML=h;}
function addPartial(){
  const AM=['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'];
  const ML={'2026-01':'1월','2026-02':'2월','2026-03':'3월','2026-04':'4월','2026-05':'5월','2026-06':'6월','2026-07':'7월','2026-08':'8월','2026-09':'9월','2026-10':'10월','2026-11':'11월','2026-12':'12월'};
  const pg=document.getElementById('partial-groups');if(!pg)return;
  const i=pg.querySelectorAll('.partial-group').length;
  const missChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:pointer;background:#f5f3ff;border-radius:5px;padding:3px 7px;font-size:11px"><input type="checkbox" class="pg-miss" data-gidx="${i}" value="${k}" onchange="onMissChange(this)"> ${ML[k]}</label>`).join('');
  const payChks=AM.map(k=>`<label style="display:flex;align-items:center;gap:3px;cursor:not-allowed;background:#f1f5f9;opacity:0.35;border-radius:5px;padding:3px 7px;font-size:11px"><input type="radio" name="pg-pay-${i}" class="pg-pay" data-gidx="${i}" value="${k}" disabled> ${ML[k]}</label>`).join('');
  const div=document.createElement('div');
  div.className='partial-group';div.dataset.gidx=i;
  div.style.cssText='border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;background:#fafafa';
  div.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;font-weight:700;color:var(--tx2)">부분납 구간 ${i+1}</span><button type="button" onclick="this.closest('.partial-group').remove();renumberGroups()" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:14px;line-height:1">✕</button></div><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 처리할 달</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${missChks}</div><div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 표기 (1개)</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${payChks}</div>\n      <div style="font-size:10px;color:var(--tx2);margin-bottom:4px">납부 금액 (원)</div><input type="number" class="fi pg-amt" placeholder="납부 금액" oninput="this.dataset.userEdited='1'" style="font-size:12px;padding:6px 8px;width:100%;box-sizing:border-box">`;
  pg.appendChild(div);
}
function removePartialGroup(idx){
  const pg=document.getElementById('partial-groups');if(!pg)return;
  const groups=pg.querySelectorAll('.partial-group');
  if(groups[idx])groups[idx].remove();
  renumberGroups();
}
function onMissChange(el){
  const g=el.closest('.partial-group');if(!g)return;
  const missKeys=[...g.querySelectorAll('.pg-miss:checked')].map(e=>e.value);
  // 납부 표기 라디오 활성화/비활성화
  g.querySelectorAll('.pg-pay').forEach(r=>{
    const act=missKeys.includes(r.value);
    r.disabled=!act;
    const lbl=r.closest('label');
    if(lbl){lbl.style.cursor=act?'pointer':'not-allowed';lbl.style.opacity=act?'1':'0.35';lbl.style.background=act?'#eff6ff':'#f1f5f9';}
    if(!act&&r.checked){r.checked=false;}
  });
  // 기본: 마지막 체크된 달로 자동 선택
  if(missKeys.length){const lastK=missKeys.sort()[missKeys.length-1];const r=g.querySelector(`.pg-pay[value="${lastK}"]`);if(r&&!g.querySelector('.pg-pay:checked'))r.checked=true;}  const amtEl=g.querySelector('.pg-amt');  if(amtEl){const base=D.members.find(x=>x.id===PMI)?.memberFee||(D.months[0]?.fee||5000);  amtEl.placeholder=`납부 금액 (기본 ${(base*missKeys.length).toLocaleString()}원)`;  if(!amtEl.dataset.userEdited)amtEl.value=missKeys.length?base*missKeys.length:'';}
}
function renumberGroups(){
  const pg=document.getElementById('partial-groups');if(!pg)return;
  pg.querySelectorAll('.partial-group').forEach((g,i)=>{
    g.dataset.gidx=i;
    const title=g.querySelector('span');if(title)title.textContent=`부분납 구간 ${i+1}`;
    g.querySelectorAll('.pg-miss').forEach(el=>el.dataset.gidx=i);
    g.querySelectorAll('.pg-pay').forEach(el=>{el.dataset.gidx=i;el.name=`pg-pay-${i}`;});
    const xBtn=g.querySelector('button');if(xBtn)xBtn.setAttribute('onclick',`removePartialGroup(${i})`);
  });
}

function rRow(r,i){const lN=!r.late?'#4f46e5':'var(--bd)',lY=r.late?'#4f46e5':'var(--bd)';const bN=!r.late?'#eef2ff':'white',bY=r.late?'#eef2ff':'white';const cN=!r.late?'#4f46e5':'var(--tx2)',cY=r.late?'#4f46e5':'var(--tx2)';return`<div class="range-row"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;font-weight:700;color:var(--tx2)">구간 ${i+1}</span><button type="button" onclick="rmRange(this)" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:13px">✕</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">시작 월</label><input class="fi pr-s" type="month" value="${r.start||''}"></div><div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">종료 월</label><input class="fi pr-e" type="month" value="${r.end||''}"></div></div><div style="margin-bottom:8px"><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">납부 금액 (원)</label><input class="fi pr-a" type="number" value="${r.amount||''}" placeholder="예: 15000"></div><div style="display:flex;gap:6px"><button type="button" onclick="tgLate(this,false)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lN};background:${bN};color:${cN};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">선납</button><button type="button" onclick="tgLate(this,true)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lY};background:${bY};color:${cY};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">후납</button></div><input type="hidden" class="pr-late" value="${r.late||false}"></div>`;}
function addRange(){const c=document.getElementById('plan-ranges');if(!c)return;const d=document.createElement('div');d.innerHTML=rRow({start:'',end:'',amount:'',late:false},c.querySelectorAll('.range-row').length);c.appendChild(d.firstChild);}
function rmRange(btn){btn.closest('.range-row').remove();document.querySelectorAll('.range-row').forEach((r,i)=>{const l=r.querySelector('span');if(l)l.textContent='구간 '+(i+1);});}
function tgLate(btn,val){const row=btn.closest('.range-row');row.querySelector('.pr-late').value=val;row.querySelectorAll('button[onclick*="tgLate"]').forEach(b=>{const on=b===btn;b.style.borderColor=on?'#4f46e5':'var(--bd)';b.style.background=on?'#eef2ff':'white';b.style.color=on?'#4f46e5':'var(--tx2)';});}
function savePlan(){const m=D.members.find(x=>x.id===PMI);if(!m)return;
if(PT==='부분납'){
  // 기존 lateKeys/pay/amt 초기화
  if(m.lateKeys){Object.keys(m.lateKeys).forEach(k=>{delete m.pay[k];});Object.values(m.lateKeys).forEach(k=>{if(m.amt)delete m.amt[k];delete m.pay[k];});}
  m.lateKeys={};if(!m.amt)m.amt={};
  const groups=document.querySelectorAll('.partial-group');
  if(!groups.length){sv();closeOv('plm');render();return;}
  let valid=true;
  groups.forEach((g,i)=>{
    const missKeys=[...g.querySelectorAll('.pg-miss:checked')].map(el=>el.value);
    const payKey=g.querySelector('.pg-pay:checked')?.value||'';
    if(!missKeys.length||!payKey){alert(`구간 ${i+1}: 납부 처리할 달과 납부 표기 달을 선택해주세요.`);valid=false;return;}
    missKeys.forEach(k=>{m.lateKeys[k]=payKey;m.pay[k]=true;});
    m.pay[payKey]=true;
    // 선납이면 payKey가 missKeys 중 가장 앞, 후납이면 가장 뒤 → amt는 후납 기준
    const allKeys=[...missKeys,payKey].filter((v,i,a)=>a.indexOf(v)===i).sort();
    const isLate=payKey===allKeys[allKeys.length-1];
    const pgAmt=parseInt(g.querySelector('.pg-amt')?.value)||0;    const baseAmt=m.memberFee||(D.months.find(x=>x.key===payKey)?.fee||5000);    const autoAmt=isLate?baseAmt*(missKeys.length+1):baseAmt*allKeys.length;    m.amt[payKey]=pgAmt||autoAmt;
  });
  if(!valid)return;
  sv();closeOv('plm');render();return;
}
// 월납
if(m.plan&&m.plan.type==='선납'){const oldRanges=m.plan.ranges||[{start:m.plan.start,end:m.plan.end}];oldRanges.forEach(r=>{if(!r.start||!r.end)return;let d=new Date(r.start+'-01'),ed=new Date(r.end+'-01');while(d<=ed){const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;if(!m.amt||m.amt[k]==null)delete m.pay[k];d=new Date(d.getFullYear(),d.getMonth()+1,1);}});}
m.plan={type:'월납'};sv();closeOv('plm');render();}
function openWM(id){WMI=id;const m=D.members.find(x=>x.id===id);if(!m)return;document.getElementById('wd-info').textContent=`'${m.name}' 회원을 탈퇴 처리합니다.`;document.getElementById('wdd').value=new Date().toISOString().substring(0,10);document.getElementById('wdd').disabled=false;document.getElementById('wdd-unk').checked=false;document.getElementById('wdnote').value='';const act=document.getElementById('wd-action');act.textContent='탈퇴 처리';act.onclick=doWithdraw;document.getElementById('wdm').classList.add('on');}
function openEditWd(id){const m=D.withdrawn.find(x=>x.id===id);if(!m)return;WMI=id;document.getElementById('wd-info').textContent=`'${m.name}' 탈퇴 정보 수정`;document.getElementById('wdd-unk').checked=!!m.wdUnknown;document.getElementById('wdd').value=m.wdate||'';document.getElementById('wdd').disabled=!!m.wdUnknown;document.getElementById('wdnote').value=m.wdNote||'';const act=document.getElementById('wd-action');act.textContent='수정 저장';act.onclick=()=>{const tgt=D.withdrawn.find(x=>x.id===WMI);if(!tgt)return;tgt.wdUnknown=document.getElementById('wdd-unk').checked;tgt.wdate=tgt.wdUnknown?null:(document.getElementById('wdd').value||null);tgt.wdNote=document.getElementById('wdnote').value.trim();sv();closeOv('wdm');renderW();};document.getElementById('wdm').classList.add('on');}
function doWithdraw(){const m=D.members.find(x=>x.id===WMI);if(!m)return;m.wdUnknown=document.getElementById('wdd-unk').checked;m.wdate=m.wdUnknown?null:(document.getElementById('wdd').value||null);m.wdNote=document.getElementById('wdnote').value.trim();D.members=D.members.filter(x=>x.id!==WMI);D.withdrawn.push(m);sv();closeOv('wdm');render();}
function restoreM(id){const i=D.withdrawn.findIndex(x=>x.id===id);if(i===-1)return;const m=D.withdrawn.splice(i,1)[0];delete m.wdate;D.members.push(m);sv();renderW();}
function permDel(id){if(!confirm('완전히 삭제합니다. 복구 불가합니다.'))return;D.withdrawn=D.withdrawn.filter(x=>x.id!==id);sv();renderW();}
function openMoM(){const years=[...new Set(D.months.map(m=>m.key.substring(0,4)))].sort();const nextY=parseInt(years[years.length-1]||new Date().getFullYear())+1;document.getElementById('moy').value=nextY;document.getElementById('mo2').value='01';document.getElementById('mom').classList.add('on');}
function openMoM2(){const ay=String(R.activeYear||new Date().getFullYear());const existing=D.months.filter(m=>m.key.startsWith(ay)).map(m=>parseInt(m.key.substring(5)));const nextMo=existing.length?Math.max(...existing)+1:1;if(nextMo>12){alert(ay+'년 12월까지 모두 추가됐습니다.');return;}document.getElementById('moy').value=ay;document.getElementById('mo2').value=String(nextMo).padStart(2,'0');document.getElementById('mom').classList.add('on');}
function saveMonth(){const y=document.getElementById('moy').value,mo=document.getElementById('mo2').value;const fee=parseInt(document.getElementById('mofee').value)||5000,key=`${y}-${mo}`;if(D.months.find(x=>x.key===key)){alert('이미 추가된 월입니다.');return;}D.months.push({key,label:`${parseInt(mo)}월`,fee});D.months.sort((a,b)=>a.key.localeCompare(b.key));D.members.forEach(mb=>{if(!mb.plan||mb.plan.type!=='선납')return;const ranges=mb.plan.ranges||[{start:mb.plan.start,end:mb.plan.end}];if(ranges.some(r=>key>=r.start&&key<=r.end))mb.pay[key]=true;});R.cm=key;R.activeYear=parseInt(key.substring(0,4));sv();closeOv('mom');render();}
function syncHeadWidths(){
  const hd=document.getElementById('tw-head');
  const bd=document.getElementById('tw-body');
  const ht=document.getElementById('head-tbl');
  const bt=document.getElementById('body-tbl');
  if(!hd||!bd||!ht||!bt)return;
  // 일반 행(divr/sectr 아닌 첫 번째 tr) 기준으로 측정
  const bRow=Array.from(bt.querySelectorAll('tr')).find(r=>!r.classList.contains('divr')&&!r.classList.contains('sectr')&&!r.classList.contains('famgapr'));
  if(!bRow)return;
  const bCells=bRow.querySelectorAll('td');
  const hCells1=ht.querySelectorAll('thead tr:first-child th');
  const hCells2=ht.querySelectorAll('thead tr:last-child th');
  bCells.forEach((td,i)=>{
    const w=td.getBoundingClientRect().width+'px';
    if(hCells1[i]){hCells1[i].style.width=w;hCells1[i].style.minWidth=w;}
    if(hCells2[i]){hCells2[i].style.width=w;hCells2[i].style.minWidth=w;}
  });
  ht.style.width=bt.getBoundingClientRect().width+'px';
}
function closeOv(id){document.getElementById(id).classList.remove('on');if(id==='mm'||id==='plm'){ACTIVE_ID=null;render();}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')['mm','plm','wdm','mom'].forEach(closeOv);});
document.querySelectorAll('.ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('on');}));
</script>
