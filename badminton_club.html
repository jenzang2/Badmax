<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BADMAX 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--sf:#ffffff;--sf2:#f1f3f7;--bd:#e4e7ef;
  --tx:#1a1d2e;--tx2:#6b7280;--tx3:#9ca3af;
  --g:#16a34a;--g2:#dcfce7;--g3:#bbf7d0;
  --r:#dc2626;--r2:#fee2e2;--r3:#fecaca;
  --b:#2563eb;--b2:#dbeafe;
  --yw:#d97706;--yw2:#fef3c7;--yw3:#fde68a;
  --adm:#7c3aed;--adm2:#ede9fe;
  --radius:10px;--radius2:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%)}
.lc{background:white;border-radius:20px;padding:36px 30px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.li{font-size:52px;margin-bottom:10px;display:block}
.lt{font-size:22px;font-weight:700;margin-bottom:4px;color:#1a1d2e}
.ls{font-size:13px;color:#6b7280;margin-bottom:24px}
.linp{width:100%;border:1.5px solid #e4e7ef;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;color:#1a1d2e}
.linp:focus{border-color:#4f46e5}
.lbtn{width:100%;margin-top:10px;background:#4f46e5;color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .2s}
.lbtn:hover{background:#4338ca}
.lerr{color:#dc2626;font-size:12px;margin-top:8px;min-height:18px}

/* APP */
#app{display:none}
.hdr{background:#1e1b4b;color:white;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:18px;font-weight:900;letter-spacing:-0.5px}
.hdr-sub{font-size:11px;opacity:.6}
.hdr-r{display:flex;align-items:center;gap:8px}
.vtab{padding:5px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.2);font-size:12px;color:rgba(255,255,255,.7);cursor:pointer;background:transparent;font-family:inherit;transition:all .2s}
.vtab.on{background:rgba(255,255,255,.15);color:white;border-color:rgba(255,255,255,.4);font-weight:500}
.logbtn{padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.15);font-size:11px;color:rgba(255,255,255,.5);cursor:pointer;background:transparent;font-family:inherit}
.logbtn:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.8)}

.main{padding:14px 14px 80px;max-width:1400px;margin:0 auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr)}}
.sc{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:10px 12px}
.sl{font-size:10px;color:var(--tx2);margin-bottom:3px}
.sv{font-size:20px;font-weight:700;line-height:1}
.sv.g{color:var(--g)}.sv.r{color:var(--r)}.sv.b{color:var(--b)}.sv.yw{color:var(--yw)}

/* TABS */
.mtabs{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.mtab{padding:5px 14px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;transition:all .2s;white-space:nowrap}
.mtab.on{background:#1e1b4b;color:white;border-color:#1e1b4b;font-weight:700}
.mtab-add{padding:5px 10px;border:1px dashed var(--bd);border-radius:8px;font-size:12px;cursor:pointer;background:transparent;color:var(--tx3);font-family:inherit}
.mtab-add:hover{border-color:var(--g);color:var(--g)}

/* TOOLBAR */
.toolbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.srch{flex:1;min-width:140px;background:white;border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--tx);outline:none;transition:border-color .2s}
.srch:focus{border-color:#4f46e5}
.tbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;white-space:nowrap;transition:all .2s}
.tbtn.on{background:var(--yw2);border-color:var(--yw3);color:var(--yw);font-weight:500}
.tbtn.on2{background:var(--b2);border-color:#93c5fd;color:var(--b);font-weight:500}
.abtn{padding:7px 16px;border-radius:8px;background:var(--g);color:white;border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .2s}
.abtn:hover{background:#15803d}

/* STICKY TOP */
.sticky-top{position:sticky;top:52px;z-index:20;background:var(--bg);padding-bottom:4px}

/* TABLE */
.tw{background:white;border:1px solid var(--bd);border-radius:var(--radius2);overflow-x:auto;margin-bottom:12px}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;z-index:4;background:var(--sf2);box-shadow:0 1px 0 var(--bd)}
th{padding:9px 10px;font-size:11px;font-weight:600;color:var(--tx2);background:var(--sf2);border-bottom:1px solid var(--bd);border-right:1px solid #eaecf0;text-align:center;white-space:nowrap}
th:last-child{border-right:none}
th.clickable{cursor:pointer;transition:background .15s}
.arr-th{cursor:pointer;color:var(--b);font-size:13px;font-weight:700;padding:4px 6px;text-align:center;white-space:nowrap}
.arr-th:hover{background:#dbeafe!important}
th.clickable:hover{background:#e8eaf0}
th:first-child{text-align:left}
/* totals header row */
.th-tot th{background:#f7f8fc;font-size:12px;font-weight:700;color:var(--g);border-bottom:2px solid var(--bd)}
.th-tot th:first-child{color:var(--tx2);font-weight:500}
td{padding:8px 10px;font-size:13px;border-bottom:1px solid #f0f2f7;border-right:1px solid #eaecf0;text-align:center;vertical-align:middle}
td:last-child{border-right:none}
td:first-child{text-align:left}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover:not(.divr) td{background:#f5f7ff}
tbody tr:hover:not(.divr){outline:1.5px solid #c7d2fe;outline-offset:-1px}
.divr td{background:#f0f2f7;font-size:10px;color:var(--tx3);text-align:center;padding:4px;letter-spacing:4px;font-weight:600}
.divr:hover td{background:#f0f2f7!important}

/* ROW STATES */
.row-un td{background:#fff9f9}
.row-un:hover td{background:#fff3f3!important}
.row-pr td{background:#fffdf5}
.row-pr:hover td{background:#fffbeb!important}
.row-adm td{background:#faf9ff}
.row-fam td{background:#f9fffe}
.row-fam:hover td{background:#f0fefa!important}

/* INDENT (가족 서브회원) */
.name-indent{padding-left:4px;display:inline-flex;align-items:center;gap:4px;color:var(--tx2)}
.name-indent::before{content:'└';color:var(--tx3);font-size:11px}
.rel-badge{display:inline-block;padding:1px 6px;border-radius:20px;font-size:9px;font-weight:700;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;margin-left:3px}

/* BADGES */
.rb{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;margin-left:3px;vertical-align:middle}
.rb-adm{background:var(--adm2);color:var(--adm)}
.rb-sub{background:#f3f4f6;color:#4b5563}
.rb-minor{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.gb{display:inline-block;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:600}
.gm{background:var(--b2);color:var(--b)}
.gf{background:#fce7f3;color:#be185d}
.fai{font-size:11px;color:var(--tx3);margin-left:3px;vertical-align:middle}

/* PAYMENT */
.pcell{cursor:pointer;transition:background .1s;position:relative}
.td-cur-month{background:#f0f7ff!important}
.th-cur-month{background:#dbeafe!important;color:#1e40af!important}
/* 선납 pill - td 높이 전체 채우기, 셀 경계에서 이어짐 */
.pv-plan-s,.pv-plan-m,.pv-plan-e{display:flex;align-items:center;justify-content:center;background:var(--yw2);color:#92400e;font-size:12px;font-weight:600;white-space:nowrap;position:absolute;top:5px;bottom:5px}
.pv-plan-s{left:4px;right:-1px;border-radius:7px 0 0 7px;padding-left:8px;justify-content:flex-start}
.pv-plan-m{left:-1px;right:-1px;border-radius:0}
.pv-plan-e{left:-1px;right:4px;border-radius:0 7px 7px 0;padding-right:8px;justify-content:center}
.pv{display:inline-block;padding:3px 8px;border-radius:7px;font-size:12px;font-weight:600;min-width:54px;text-align:center;transition:all .15s}
.pv-ok{background:var(--g2);color:#166534}
.pv-ok:hover{background:var(--g3)}
.pv-no{background:var(--r2);color:#991b1b;border:1px dashed var(--r3)}
.pv-no:hover{background:var(--r3)}
.pv-pl{background:var(--yw2);color:#92400e;border-radius:7px;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;white-space:nowrap}
/* 선납 pill 연속 표기 - td 배경 흰색, span이 늘어남 */
.pill-single{display:inline-flex;align-items:center;gap:3px;background:var(--yw2);border-radius:7px;color:#92400e;font-size:12px;font-weight:600;padding:4px 8px;white-space:nowrap;width:fit-content}
/* 후납 pill */
.pv-late-prev,.pv-late-pay{display:flex;align-items:center;background:#ede9fe;color:#4c1d95;font-size:12px;font-weight:600;white-space:nowrap;position:absolute;top:5px;bottom:5px}
.pv-late-prev{left:4px;right:-1px;border-radius:7px 0 0 7px;padding-left:8px;justify-content:flex-start}
.pv-late-pay{left:-1px;right:4px;border-radius:0 7px 7px 0;padding-right:8px;justify-content:flex-end}
.pv-ex{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;cursor:default}
.plb{display:inline-block;padding:0 5px;border-radius:20px;font-size:8px;font-weight:800;background:#fde68a;color:#78350f;margin-left:2px;vertical-align:middle;letter-spacing:.5px}

/* TOTAL ROW */
.totr td{background:var(--sf2);font-weight:700;font-size:12px;color:var(--g);border-top:2px solid var(--bd)}
.totr:hover td{background:var(--sf2)!important}

/* UNPAID BOX */
.ubox{background:white;border:1px solid var(--bd);border-radius:var(--radius2);padding:14px;margin-bottom:10px}
.ut{font-size:12px;font-weight:700;color:var(--yw);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{background:var(--r2);border:1px solid var(--r3);color:var(--r);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:500}
.ok-chip{color:var(--g);font-size:13px;font-weight:500}
.kbox{background:#f8f9fb;border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:12px;line-height:1.8;color:var(--tx);white-space:pre-wrap;min-height:48px;word-break:break-all;cursor:text;outline:none}
.kbox[contenteditable=true]{border-color:#4f46e5}
.krow{display:flex;gap:7px;margin-top:8px;align-items:center}
.kbtn{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;font-weight:500;transition:all .2s}
.kbtn:hover{border-color:#4f46e5;color:#4f46e5}
.kbtn.copied{background:var(--g2);border-color:var(--g3);color:var(--g)}
.knote{font-size:11px;color:var(--tx3);flex:1}

/* WITHDRAWN VIEW */
.wcard{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:12px 14px;margin-bottom:7px}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.wn{font-weight:600;font-size:14px}
.wd{font-size:11px;color:var(--tx2);margin-top:2px}
.wnote{font-size:12px;color:var(--tx2);background:var(--bg);border-radius:7px;padding:6px 10px;margin-top:8px;border-left:2px solid var(--bd);white-space:pre-wrap}
.wbtns{display:flex;gap:6px;flex-shrink:0}
.wbtn{padding:5px 12px;border-radius:7px;border:1px solid var(--bd);font-size:11px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;transition:all .2s;white-space:nowrap}
.wbtn.restore:hover{border-color:var(--g);color:var(--g)}
.wbtn.del:hover{border-color:var(--r);color:var(--r)}
.w-stats{display:flex;gap:8px;margin-bottom:12px}
.w-stat{background:white;border:1px solid var(--bd);border-radius:var(--radius);padding:8px 14px;font-size:12px;color:var(--tx2)}
.w-stat strong{color:var(--tx);font-weight:700}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(15,10,40,.55);z-index:200;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:480px){.ov{align-items:center;padding:20px}}
.ov.on{display:flex}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
@media(min-width:480px){.modal{border-radius:16px;padding:22px 20px}}
.mttl{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--tx)}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:#4f46e5;background:white}
select.fi{cursor:pointer}
.sdiv{height:1px;background:var(--bd);margin:14px 0}
.sttl{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.rgrp{display:flex;gap:6px;flex-wrap:wrap}
.ropt{padding:6px 14px;border-radius:8px;border:1.5px solid var(--bd);font-size:12px;cursor:pointer;background:white;color:var(--tx2);font-family:inherit;transition:all .15s;font-weight:500}
.ropt.on{border-color:#4f46e5;color:#4f46e5;background:#eef2ff}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:11px;border-radius:9px;border:1.5px solid var(--bd);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.mpri{background:#1e1b4b;color:white;border-color:#1e1b4b}
.mpri:hover{background:#312e81}
.mcan{background:var(--sf2);color:var(--tx2)}
.mcan:hover{background:var(--bd)}
.mdng{background:var(--r);color:white;border-color:var(--r);flex:0;padding:11px 16px}
.mdng:hover{background:#b91c1c}
.info-box{background:var(--sf2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--tx2);line-height:1.6}

/* PLAN TABS */
.ptabs{display:flex;gap:6px;margin-bottom:12px}
.ptab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--bd);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:white;color:var(--tx2);transition:all .15s;text-align:center}
.ptab.on{background:#fef3c7;border-color:#fde68a;color:#92400e}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--tx3);font-size:14px}

/* FAB */
.fab{display:none;position:fixed;bottom:20px;right:16px;z-index:40;background:#1e1b4b;color:white;border:none;border-radius:50px;padding:13px 20px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(30,27,75,.35)}
@media(max-width:500px){.fab{display:flex;align-items:center;gap:6px}.abtn{display:none}}

/* VIEW MODE SEGMENTED CONTROL */
.mode-seg{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden;flex-shrink:0}
.mseg{padding:6px 12px;font-size:12px;font-family:inherit;background:white;color:var(--tx2);border:none;border-right:1px solid var(--bd);cursor:pointer;transition:all .15s;white-space:nowrap}
.mseg:last-child{border-right:none}
.mseg.on{background:#1e1b4b;color:white;font-weight:600}
.mseg:hover:not(.on){background:var(--sf2)}

/* SECTION / GROUP ROWS */
.sectr td{font-size:11px;font-weight:700;padding:6px 10px;letter-spacing:.5px;border-bottom:1px solid var(--bd);text-align:left}
.sectr:hover td{background:inherit!important}
.famgapr td{height:5px;background:var(--bg);border:none;padding:0}
.famgapr:hover td{background:var(--bg)!important}
.row-famhead td{background:#f0fdf8}
.row-famhead:hover td{background:#e6faf4!important}
tr.row-active{outline:1.5px solid #4f46e5}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lc">
    <span class="li">🏸</span>
    <div class="lt">BADMAX</div>
    <div class="ls">회원관리 (운영진 전용)</div>
    <input class="linp" type="password" id="pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">로그인</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-l">
      <div>
        <div class="hdr-logo">BADMAX</div>
        <div class="hdr-sub">회원관리 시스템</div>
      </div>
    </div>
    <div class="hdr-r">
      <div id="sync-dot" style="display:none;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6)">
        <span id="sync-icon" style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block"></span>
        <span id="sync-txt">실시간 연결됨</span>
      </div>
      <button class="vtab on" id="vt-m" onclick="setView('m')">회원목록</button>
      <button class="vtab" id="vt-w" onclick="setView('w')">탈퇴회원</button>
      <button class="logbtn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main">
    <!-- MEMBERS VIEW -->
    <div id="v-m">
      <div class="sticky-top">
        <div class="stats" id="stats"></div>
        <div class="mtabs" id="mtabs"></div>
        <div class="toolbar">
          <input class="srch" id="srch" placeholder="🔍  이름 검색..." oninput="R.q=this.value;render()">
          <button class="tbtn" id="ubtn" onclick="R.fu=!R.fu;render()">⚠ 미납자만</button>
          <div class="mode-seg">
            <button class="mseg on" id="ms-def" onclick="setMode('def')">기본</button>
            <button class="mseg" id="ms-alpha" onclick="setMode('alpha')">가나다순</button>
            <button class="mseg" id="ms-fam" onclick="setMode('fam')">가족구분</button>
          </div>
          <button class="abtn" onclick="openMM()">+ 회원 추가</button>
        </div>
      </div>
      <div style="overflow-x:auto;border:1px solid var(--bd);border-bottom:none;border-radius:var(--radius2) var(--radius2) 0 0;background:var(--sf2)" id="tw-head">
        <table id="th-table"><thead id="th"></thead></table>
      </div>
      <div class="tw" id="tw" style="border-radius:0 0 var(--radius2) var(--radius2);border-top:none">
        <table><tbody id="tb"></tbody></table>
      </div>
      <div id="ubox" class="ubox"></div>
    </div>

    <!-- WITHDRAWN VIEW -->
    <div id="v-w" style="display:none">
      <div id="wlist"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openMM()">+ 회원 추가</button>

<!-- ── MODALS ── -->

<!-- 회원추가/수정 -->
<div class="ov" id="mm">
<div class="modal">
  <div class="mttl" id="mm-t">👤 회원 추가</div>
  <div class="fg" style="display:flex;gap:8px;align-items:flex-end">

// Firebase는 배열을 객체로 변환할 수 있음 → 배열로 복원
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  return Object.values(v).filter(Boolean);
}
function normMember(m) {
  if (!m) return null;
  return {
    ...m,
    pay:    (m.pay && typeof m.pay === 'object' && !Array.isArray(m.pay)) ? m.pay : {},
    amt:    (m.amt && typeof m.amt === 'object' && !Array.isArray(m.amt)) ? m.amt : {},
    plan:   m.plan || null,
    lateKeys: (m.lateKeys && typeof m.lateKeys==='object') ? m.lateKeys : {},
    exempt: (m.role === '운영진') ? true : !!m.exempt,
    minor: m.role === '미성년',
    fgId:      m.fgId || null,
    fgRel:     m.fgRel || '',
    fgLeader:  !!m.fgLeader,
    memberFee: m.memberFee || null,
    startMonth: m.startMonth || null
  };
}
function normData(val) {
  if (!val) return JSON.parse(JSON.stringify(INIT));
  return {
    months:    toArr(val.months),
    withdrawn: toArr(val.withdrawn).map(normMember).filter(Boolean),
    members:   toArr(val.members).map(normMember).filter(Boolean)
  };
}

function sv() {
  const snap = JSON.parse(JSON.stringify(D));
  if (db) {
    _saving = true;
    setSyncStatus('saving');
    db.ref('club').set(snap)
      .then(() => { _saving = false; setSyncStatus('ok'); })
      .catch(e => { _saving = false; setSyncStatus('error'); console.error(e); });
  } else {
    try { localStorage.setItem('bm_club_v2', JSON.stringify(snap)); } catch(e) {}
  }
}

function ld() {
  if (db) {
    setSyncStatus('connecting');
    db.ref('club').on('value', snapshot => {
      if (_saving) return; // 내가 저장 중이면 덮어쓰기 방지
      const val = snapshot.val();
      if (val && (val.members || val.months)) {
        D = normData(val);
        if (!D.months.find(m => m.key === R.cm))
          R.cm = D.months[D.months.length - 1]?.key || R.cm;
        if (!R._rangeInited) { initVisRange(); R._rangeInited = true; }
      } else {
        D = JSON.parse(JSON.stringify(INIT));
        db.ref('club').set(JSON.parse(JSON.stringify(INIT)));
      }
      setSyncStatus('ok');
      render();
    });
    db.ref('.info/connected').on('value', snap => {
      if (!snap.val()) setSyncStatus('offline');
    });
  } else {
    try {
      const r = localStorage.getItem('bm_club_v2');
      if (r) { D = normData(JSON.parse(r)); return; }
    } catch(e) {}
    D = JSON.parse(JSON.stringify(INIT));
  }
}
function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const icon = document.getElementById('sync-icon');
  const txt = document.getElementById('sync-txt');
  if (!dot) return;
  if (!FB_READY) { dot.style.display = 'none'; return; }
  dot.style.display = 'flex';
  const map = {
    ok:          { color: '#22c55e', text: '실시간 연결됨' },
    saving:      { color: '#f59e0b', text: '저장 중...' },
    connecting:  { color: '#f59e0b', text: '연결 중...' },
    offline:     { color: '#ef4444', text: '오프라인' },
    error:       { color: '#ef4444', text: '저장 오류' },
  };
  const s = map[state] || map.ok;
  icon.style.background = s.color;
  txt.textContent = s.text;
}

// ── HELPERS ──────────────────────────────────────────
function isPaid(m, key) {
  if (m.exempt) return true;
  if (isNA(m, key)) return true;
  if (m.lateKeys) {
    if (m.lateKeys[key]) return true; // 납부달
    if (Object.values(m.lateKeys).flat().includes(key)) return true; // 밀린달
  }
  if (m.plan) {
    const p = m.plan;
    if (p.type === '완납' && key.startsWith(String(p.year))) return true;
    if (p.type === '선납') {
      // 다중 구간 지원
      const ranges = p.ranges || [{start:p.start, end:p.end}];
      if (ranges.some(r => key >= r.start && key <= r.end)) return true;
    }
  }
  return !!m.pay[key];
}
function planLabel(m, key) {
  if (m.exempt) return '면제';
  if (!m.plan) return null;
  const p = m.plan;
  if (p.type === '완납' && key.startsWith(String(p.year))) {
    if (p.amount === 55000) {
      const paidMonth = Object.keys(m.amt || {}).find(k => m.amt[k] === 55000 && k.startsWith(String(p.year)));
      const yearMonths = D.months.filter(mo => mo.key.startsWith(String(p.year))).map(mo=>mo.key).sort();
      const firstMonth = paidMonth || yearMonths[0];
      if (key === firstMonth) return '완납_first'; // 최초 월: 금액+완납배지
      return '완납_rest'; // 이후 월: 완납 배지만(노란색)
    }
    // 일반 완납: amt에 기록된 월이 있으면 그 달만 금액+완납, 이후는 완납만
    const paidMonth = Object.keys(m.amt || {}).find(k => k.startsWith(String(p.year)));
    if (paidMonth) {
      if (key === paidMonth) return '완납_first';
      return '완납_rest';
    }
    return '완납_rest'; // amt 없으면 전부 완납 배지만
  }
  if (p.type === '선납') {
    const ranges = p.ranges || [{start:p.start, end:p.end, late:p.late}];
    for (const r of ranges) {
      if (key >= r.start && key <= r.end) {
        return r.late ? '선납_후납' : '선납';
      }
    }
  }
  return null;
}
// 선납 구간 정보 반환 (셀 강조용)
function getPlanRangeInfo(m, key) {
  if (!m.plan || m.plan.type !== '선납') return null;
  const ranges = m.plan.ranges || [{start:m.plan.start, end:m.plan.end}];
  for (const r of ranges) {
    if (key >= r.start && key <= r.end) {
      return { isStart: key === r.start, isEnd: key === r.end, isMid: key > r.start && key < r.end };
    }
  }
  return null;
}
function getFee(m, key) {
  if (m.exempt) return 0;
  if (m.amt && m.amt[key] != null) return m.amt[key];
  // 선납 시작월이면 해당 구간의 납부금액 반환
  if (m.plan && m.plan.type === '선납') {
    const ranges = m.plan.ranges || [{start:m.plan.start, end:m.plan.end, amount:m.plan.amount}];
    for (const r of ranges) {
      if (key === r.start && r.amount > 0) return r.amount;
    }
  }
  // 후납 납부달이면 밀린달 수 포함 합산 금액
  if (m.lateKeys && m.lateKeys[key]) {
    const baseFee = m.memberFee || (D.months.find(x => x.key === key)?.fee || 5000);
    return baseFee * (m.lateKeys[key].length + 1);
  }
  return m.memberFee || (D.months.find(x => x.key === key)?.fee || 5000);
}
function isNA(m, key) {
  // 가입 시작월 이전은 해당없음(-) 처리
  return m.startMonth && key < m.startMonth;
}
function age(y) { return new Date().getFullYear() - y + 1; }
function mkey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }

// ── SORT ─────────────────────────────────────────────
function setMode(m) {
  R.mode = m;
  ['def','alpha','fam'].forEach(k => document.getElementById('ms-'+k).classList.toggle('on', k===m));
  render();
}

function sorted() {
  let ms = [...D.members];
  if (R.q) ms = ms.filter(m => m.name.includes(R.q));
  if (R.fu) ms = ms.filter(m => !m.exempt && !isPaid(m, R.cm));

  const adm = ms.filter(m => ROLES[m.role] !== undefined)
    .sort((a,b) => (ROLES[a.role]-ROLES[b.role]) || a.name.localeCompare(b.name,'ko'))
    .map(m => ({...m, _indent:0, _rel:''}));
  const reg = ms.filter(m => ROLES[m.role] === undefined);

  if (R.mode === 'alpha') {
    const regAlpha = reg.map(m => ({...m, _indent:0, _rel:''})).sort((a,b) => a.name.localeCompare(b.name,'ko'));
    const out = [...adm];
    if (adm.length && regAlpha.length) out.push({_type:'div', label:'— 일반 회원 —'});
    out.push(...regAlpha);
    return out;
  }

  if (R.mode === 'fam') {
    return sortedFamilyMode(adm, reg);
  }

  // default mode
  const grouped = groupFam(reg);
  const out = [...adm];
  if (adm.length && grouped.length) out.push({_type:'div', label:'— 일반 회원 —'});
  out.push(...grouped);
  return out;
}

function sortedFamilyMode(adm, reg) {
  const solo = reg.filter(m => !m.fgId).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  const withFam = reg.filter(m => m.fgId);
  const grps = {};
  withFam.forEach(m => { (grps[m.fgId] = grps[m.fgId] || []).push(m); });
  const famGroups = Object.values(grps).map(grp => {
    const { head, subs } = pickHead(grp);
    return { key: head.name, head:{...head,_indent:0,_rel:'',_famHead:true}, subs:subs.map(s=>({...s,_indent:1,_rel:s.fgRel||''})) };
  }).sort((a,b)=>a.key.localeCompare(b.key,'ko'));
  const out = [...adm];
  if (adm.length) out.push({_type:'div', label:'— 일반 회원 —'});
  if (famGroups.length) {
    out.push({_type:'section', label:`👨‍👩‍👧 가족회원 — ${famGroups.length}가족`, bg:'#f0fdf4', tc:'#166534'});
    famGroups.forEach((fg, i) => {
      if (i > 0) out.push({_type:'famgap'});
      out.push(fg.head);
      fg.subs.forEach(s => out.push(s));
    });
  }
  if (solo.length) {
    out.push({_type:'section', label:`👤 개인회원 — ${solo.length}명`, bg:'#f1f5f9', tc:'#475569'});
    solo.forEach(m => out.push({...m, _indent:0, _rel:''}));
  }
  return out;
}

const REL_ORDER = {'배우자':0,'자녀':1,'부모':2,'형제/자매':3};
function pickHead(grp) {
  // fgLeader 플래그 있는 멤버를 대표로, 없으면 id 오름차순
  const leader = grp.find(m => m.fgLeader);
  if (leader) {
    return { head: leader, subs: grp.filter(m => m.id !== leader.id).sort((a,b)=>(REL_ORDER[a.fgRel]??9)-(REL_ORDER[b.fgRel]??9)) };
  }
  const s2 = [...grp].sort((a,b)=>a.id-b.id);
  return { head: s2[0], subs: s2.slice(1).sort((a,b)=>(REL_ORDER[a.fgRel]??9)-(REL_ORDER[b.fgRel]??9)) };
}
function groupFam(ms) {
  const solo = ms.filter(m => !m.fgId).map(m => ({...m, _indent:0, _rel:''}));
  const withFam = ms.filter(m => m.fgId);
  const grps = {};
  withFam.forEach(m => { (grps[m.fgId] = grps[m.fgId] || []).push(m); });
  const famGroups = Object.values(grps).map(grp => {
    const { head, subs } = pickHead(grp);
    return { key: head.name, head:{...head,_indent:0,_rel:''}, subs:subs.map(s=>({...s,_indent:1,_rel:s.fgRel||''})) };
  });
  const combined = [
    ...solo.map(m => ({k:m.name, type:'solo', m})),
    ...famGroups.map(fg => ({k:fg.key, type:'fam', ...fg}))
  ].sort((a,b) => a.k.localeCompare(b.k,'ko'));
  const rows = [];
  combined.forEach(item => {
    if (item.type==='solo') rows.push(item.m);
    else { rows.push(item.head); item.subs.forEach(s=>rows.push(s)); }
  });
  return rows;
}

    `<button class="mtab-add" onclick="openMoM()">+ 월 추가</button>`;

  document.getElementById('ubtn').classList.toggle('on', R.fu);

  const visMons = D.months.filter(m => !R.hiddenCols.has(m.key));
  const hiddenBefore = D.months.filter(m => R.hiddenCols.has(m.key) && visMons.length && m.key < visMons[0].key);
  const hiddenAfter  = D.months.filter(m => R.hiddenCols.has(m.key) && visMons.length && m.key > visMons[visMons.length-1].key);
  const hidCount = D.months.length - visMons.length;
  let countBetween = 0;
  for (let i = 1; i < visMons.length; i++) {
    countBetween += D.months.filter(m => R.hiddenCols.has(m.key) && m.key > visMons[i-1].key && m.key < visMons[i].key).length > 0 ? 1 : 0;
  }

  });
  const paidCount = {};

    : '';

  const nowKeyH = (()=>{ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })();

  document.getElementById('th').innerHTML = `
    <tr class="th-tot">
      <th style="text-align:left;color:var(--tx2);font-size:10px;width:1%;white-space:nowrap">합계</th>
      ${visMons.map((mo, idx) => {
        const pv = idx > 0 ? visMons[idx-1].key : null;
        const hb = pv ? D.months.filter(x => R.hiddenCols.has(x.key) && x.key > pv && x.key < mo.key) : [];
        const bTot = hb.length ? `<th style="width:22px;padding:0;border-right:1px solid #eaecf0;background:var(--sf2)"></th>` : '';
        return bTot + `<th style="min-width:90px;width:90px">${totals[mo.key].toLocaleString()}원<br><span style="font-size:9px;font-weight:400;color:var(--tx2)">${paidCount[mo.key]}명</span></th>`;
      }).join('')}
      <th style="width:1%"></th>
    </tr>
    <tr>
      <th style="width:1%;white-space:nowrap;text-align:left">회원</th>
      ${visMons.map((m, idx) => {
        const pv = idx > 0 ? visMons[idx-1].key : null;
        const hb = pv ? D.months.filter(mo => R.hiddenCols.has(mo.key) && mo.key > pv && mo.key < m.key) : [];
        const bTh = hb.length
          ? `<th style="width:22px;padding:0;cursor:pointer;text-align:center;font-size:11px;color:var(--b);border-right:1px solid #eaecf0" onclick="revealBetweenOne('${pv}','${m.key}')" title="${hb[0].label} 보기">…</th>` : '';
        const curCls = m.key === nowKeyH ? ' th-cur-month' : '';
        const isFirst = idx === 0;
        const isLast = idx === visMons.length - 1;
        // ◀ = 첫번째 월 th 안 왼쪽에 inline
        const leftBtn = (isFirst && prevArrow)
          ? `<span onclick="event.stopPropagation();showPrevOne()" title="${hiddenBefore[hiddenBefore.length-1].label} 보기" style="background:white;border:1.5px solid #c7d2fe;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:700;color:var(--b);line-height:1;flex-shrink:0;vertical-align:middle;margin-right:4px">◀</span>`
          : '';
        // ▶ = 마지막 월 th 안 오른쪽에 inline
        const rightBtn = (isLast && nextArrow)
          ? `<span onclick="event.stopPropagation();showNextOne()" title="${hiddenAfter[0].label} 보기" style="background:white;border:1.5px solid #c7d2fe;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;font-weight:700;color:var(--b);line-height:1;flex-shrink:0;vertical-align:middle;margin-left:4px">▶</span>`
          : '';
        return bTh + `<th class="clickable${curCls}" onclick="toggleCol('${m.key}')" title="클릭: 숨기기" style="min-width:90px;width:90px">${leftBtn}${m.label}${rightBtn}</th>`;
      }).join('')}
      <th style="width:1%;white-space:nowrap;padding:9px 14px">설정</th>
    </tr>`;

  const s = sorted();
  if (!s.length || (s.length === 1 && s[0]._div)) {
    document.getElementById('tb').innerHTML = `<tr><td colspan="${1+visMons.length+(hiddenBefore.length?1:0)+(hiddenAfter.length?1:0)+countBetween+1}" class="empty">회원 없음</td></tr>`;
    renderUnpaid(cm);
    return;
  }

  const rows = s.map(item => {
    if (item._type === 'div') return `<tr class="divr"><td colspan="${1+visMons.length+(hiddenBefore.length?1:0)+(hiddenAfter.length?1:0)+countBetween+1}">${item.label||'— 일반 회원 —'}</td></tr>`;
    if (item._type === 'section') return `<tr class="sectr" style="background:${item.bg||'#f8f9fb'}"><td colspan="${1+visMons.length+(hiddenBefore.length?1:0)+(hiddenAfter.length?1:0)+countBetween+1}" style="color:${item.tc||'var(--tx2)'}">${item.label}</td></tr>`;
    if (item._type === 'famgap') return `<tr class="famgapr"><td colspan="${1+visMons.length+(hiddenBefore.length?1:0)+(hiddenAfter.length?1:0)+countBetween+1}"></td></tr>`;
    const m = item;
    const isAdm = ROLES[m.role] !== undefined;
    const isExempt = !!m.exempt;
    const isSub = m._indent > 0;
    const hasPlan = !isExempt && m.plan && m.plan.type !== '월납';
    const anyUnpaid = !isExempt && visMons.some(mo => !isPaid(m, mo.key));
    const rowCls = isAdm ? 'row-adm' : (isSub ? 'row-fam' : (m._famHead ? 'row-famhead' : (hasPlan ? 'row-pr' : (anyUnpaid ? 'row-un' : ''))));

    // Name cell
    const isMinor = m.role === '미성년';
    let nameHtml;
    const gbSpan = `<span class="gb ${m.g === '남' ? 'gm' : 'gf'}" style="flex-shrink:0">${m.g}</span>`;
    const yrSpan = `<span style="color:var(--tx3);font-size:11px;white-space:nowrap;flex-shrink:0">${m.year}</span>`;
    if (isSub) {
      const memoMarkSub = m.memo ? '<span title="'+m.memo.replace(/"/g,"'")+'" style="color:#f59e0b;font-size:10px;margin-left:2px;cursor:help">★</span>' : '';
      nameHtml = `<span class="name-indent" style="flex:1;min-width:0">${m.name}${memoMarkSub}<span class="rel-badge">${m._rel}</span>${isMinor ? '<span class="rb rb-minor">미성년</span>' : ''}</span>${yrSpan}${gbSpan}`;
    } else {
      const memoMark = m.memo ? '<span title="'+m.memo.replace(/"/g,"'")+'" style="color:#f59e0b;font-size:10px;margin-left:2px;cursor:help">★</span>' : '';
      nameHtml = `<span style="font-weight:${isAdm?600:400};color:${isMinor?'var(--tx2)':''};flex:1;min-width:0">${m.name}${memoMark}${isAdm ? `<span class="rb rb-adm">${m.role}</span>` : isMinor ? '<span class="rb rb-minor">미성년</span>' : ''}${m.fgId && m._indent === 0 ? '<span class="fai" style="font-size:10px">👨‍👩</span>' : ''}</span>${yrSpan}${gbSpan}`;
    }

    const cells = visMons.map((mo, idx) => {
      const prevMoKey = idx > 0 ? visMons[idx-1].key : null;
      const hasBetween = prevMoKey && D.months.some(x => R.hiddenCols.has(x.key) && x.key > prevMoKey && x.key < mo.key);
      const betweenTd = hasBetween ? '<td style="width:20px;padding:0;border-right:1px solid #eaecf0"></td>' : '';
      if (isExempt) return betweenTd + `<td><span style="color:var(--tx3);font-size:15px">—</span></td>`;
      if (isNA(m, mo.key)) return betweenTd + `<td><span style="color:var(--tx3);font-size:13px">—</span></td>`;
      const nowKey = (()=>{ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; })();
      const isFuture = mo.key > nowKey;
      const pd = isPaid(m, mo.key);
      const pl = planLabel(m, mo.key);
      const fee = getFee(m, mo.key);
      let tdClass = '';
      // — 표시 조건: 미래달이면서 플랜없음 OR 선납 범위 이후 달
      const afterPlan = m.plan && m.plan.type === '선납' && (() => {
        const ranges = m.plan.ranges || [{end:m.plan.end}];
        const maxEnd = ranges.reduce((mx,r)=>r.end>mx?r.end:mx,'');
        return mo.key > maxEnd;
      })();
      const futureDash = (isFuture && !m.plan && !m.pay[mo.key]) || (afterPlan && !m.pay[mo.key]);
      // 선납 범위 이후 달이면 — (미납 아님)
      if (afterPlan && !m.pay[mo.key]) return betweenTd + `<td><span style="color:var(--tx3);font-size:15px">—</span></td>`;
      let inner;
      if (pl === '완납_first') {
        inner = `<span class="pv pv-pl">${fee.toLocaleString()}<span class="plb">선납</span></span>`;
      } else if (pl === '완납_rest') {
        inner = `<span class="pv pv-pl"><span class="plb">선납</span></span>`;
      } else if (pl === '선납' || pl === '선납_후납') {
        const badge = pl === '선납_후납' ? '후납' : '선납';
        const ri = getPlanRangeInfo(m, mo.key);
        if (ri && ri.isStart && !ri.isEnd) {
          inner = `<span class="pv-plan-s">${fee.toLocaleString()} <span class="plb">${badge}</span></span>`;
        } else if (ri && ri.isMid) {
          inner = `<span class="pv-plan-m">${badge}</span>`;
        } else if (ri && ri.isEnd && !ri.isStart) {
          inner = `<span class="pv-plan-e">${badge}</span>`;
        } else {
          inner = `<span class="pill-single">${fee.toLocaleString()}<span class="plb">${badge}</span></span>`;
        }
      } else if (futureDash) {
        inner = `<span class="pv" style="color:var(--tx3);background:transparent;font-size:15px" title="클릭: 선납처리">—</span>`;
      } else if (m.lateKeys && m.lateKeys[mo.key]) {
        // 납부한 달(마지막) → 끝, 금액 표시
        inner = `<span class="pv-late-pay">${fee.toLocaleString()} <span style="background:#7c3aed;color:#fff;border-radius:4px;padding:1px 4px;font-size:10px">후납</span></span>`;
      } else if (m.lateKeys && Object.values(m.lateKeys).flat().includes(mo.key)) {
        // 밀린 달 → 시작, 배지만
        inner = `<span class="pv-late-prev">후납</span>`;
      } else if (pd) {
        inner = `<span class="pv pv-ok">${fee.toLocaleString()}</span>`;
      } else {
        inner = `<span class="pv pv-no">미납</span>`;
      }
      const locked = pl === '완납_first' || pl === '완납_rest' || pl === '선납' || pl === '선납_후납';
      let clickFn;
      if (locked) {
        clickFn = '';
      } else if (futureDash) {
        // — 클릭 → 선납처리(5000)
        clickFn = `onclick="openAmtModal(${m.id},'${mo.key}')"`;
      } else if (pd) {
        // 납부됨 클릭 → 바로 취소
        clickFn = `onclick="toggleCancel(${m.id},'${mo.key}')"`;
      } else {
        // 미납 클릭 → 납부처리
        clickFn = `onclick="openAmtModal(${m.id},'${mo.key}')"`;
      }
      const isCurMonth = mo.key === nowKey;
      const curCls = isCurMonth ? ' td-cur-month' : '';
      return betweenTd + `<td class="pcell${tdClass?' '+tdClass:''}${curCls}" ${clickFn}>${inner}</td>`;
    }).join('');

    const activeClass = ACTIVE_ID === m.id ? ' row-active' : '';
    return `<tr class="${rowCls}${activeClass}" ondblclick="openEM(${m.id})" style="cursor:pointer">
      <td style="white-space:nowrap"><div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap">${nameHtml}</div></td>
      ${cells}
      <td style="white-space:nowrap">
        ${isExempt ? '' : `<button class="tbtn" onclick="openPM(${m.id})" style="padding:4px 8px;font-size:11px;color:var(--yw)" title="납부설정/금액수정">💰</button>`}
      </td>
    </tr>`;
  }).join('');

  document.getElementById('tb').innerHTML = rows;

  // thead/tbody 열 너비 동기화
  requestAnimationFrame(() => {
    const thTable = document.getElementById('th-table');
    const tbTable = document.querySelector('#tw table');
    if (!thTable || !tbTable) return;
    const tbCols = tbTable.querySelector('tr');
    const thCols = thTable.querySelector('tr');
    if (!tbCols || !thCols) return;
    const tbTds = tbCols.querySelectorAll('td,th');
    const thThs = thTable.querySelectorAll('thead tr:last-child th');
    thThs.forEach((th, i) => {
      if (tbTds[i]) th.style.minWidth = tbTds[i].offsetWidth + 'px';
    });
    thTable.style.width = tbTable.offsetWidth + 'px';
    document.getElementById('tw-head').scrollLeft = document.getElementById('tw').scrollLeft;
  });

  // tw 가로 스크롤 시 thead도 같이
  const tw = document.getElementById('tw');
  const twHead = document.getElementById('tw-head');
  tw.onscroll = () => { twHead.scrollLeft = tw.scrollLeft; };
  renderUnpaid(cm);
}

let R_ubox = null;
function renderUnpaid(cm) {
  if (!cm) cm = D.months.find(x => x.key === R.cm);
  if (!cm) return;
  R_ubox = R.cm; // 항상 상단 선택 월과 동기화
  const ucm = D.months.find(x => x.key === R_ubox) || cm;
  const unpaid = D.members.filter(m => !m.exempt && m.role !== '미성년' && !isPaid(m, ucm.key));
  const kakaoText = unpaid.length
    ? `[${ucm.label} 회비 미납 안내]\n\n${unpaid.map(m => m.name).join(', ')} 님,\n이번 달 회비 납부 부탁드립니다 🏸`
    : `✅ ${ucm.label} 전원 납부 완료!`;
  document.getElementById('ubox').innerHTML = `
    <div class="ut">
      <span>⚠️ ${ucm.label} 미납자 확인</span>
    </div>
    <div style="margin-bottom:8px;font-size:12px;color:var(--tx2)">${ucm.label} 미납 <strong style="color:var(--r)">${unpaid.length}명</strong></div>
    <div class="chips">
      ${unpaid.length
        ? unpaid.map(m => `<span class="chip">${m.name}</span>`).join('')
        : `<span class="ok-chip">✅ ${ucm.label} 전원 납부 완료!</span>`}
    </div>
    <div class="kbox" id="kbox" contenteditable="true">${kakaoText.replace(/\n/g,'<br>')}</div>
    <div class="krow">
      <span class="knote">카카오톡에 바로 붙여넣기</span>
      <button class="kbtn" onclick="copyKakao()" id="copybtn">📋 복사</button>
    </div>`;
}

function copyKakao() {
  const el = document.getElementById('kbox');
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copybtn');
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.remove('copied'); }, 2000);
  });
}

function renderW() {
  const list = document.getElementById('wlist');
  if (!D.withdrawn.length) {
    list.innerHTML = '<div class="empty">탈퇴 회원이 없습니다.</div>';
    return;
  }
  const byYear = {};
  D.withdrawn.forEach(m => {
    const yr = m.wdate ? m.wdate.substring(0,4) : (m.wdUnknown ? '날짜모름' : '미기록');
    (byYear[yr] = byYear[yr] || []).push(m);
  });
  const sortedYears = Object.keys(byYear).sort((a,b) => b.localeCompare(a));
  list.innerHTML = `<div class="w-stats">
    <div class="w-stat">전체 탈퇴 <strong>${D.withdrawn.length}명</strong></div>
    <div class="w-stat">날짜 기록 <strong>${D.withdrawn.filter(m=>m.wdate).length}명</strong></div>
    <div class="w-stat">날짜 모름 <strong>${D.withdrawn.filter(m=>m.wdUnknown||(!m.wdate&&!m.wdUnknown)).length}명</strong></div>
  </div>` +
  sortedYears.map(yr => `
    <div style="font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:2px;margin:14px 0 6px;padding-left:2px">${yr === '날짜모름'||yr==='미기록' ? '📂 ' + yr : '📅 ' + yr + '년 탈퇴'}</div>
    ${byYear[yr].map(m => `
    <div class="wcard">
      <div class="wcard-top">
        <div style="flex:1">
          <div class="wn">${m.name} <span class="gb ${m.g==='남'?'gm':'gf'}">${m.g}</span> <span style="font-size:11px;color:var(--tx3);font-weight:400">${m.year}년생 · ${m.role}</span></div>
          <div class="wd">${m.wdUnknown ? '탈퇴일: 모름' : m.wdate ? '탈퇴일: '+m.wdate : '탈퇴일: 미기록'}</div>
        </div>
        <div class="wbtns">
          <button class="wbtn" onclick="openEditWd(${m.id})" title="수정">✏️</button>
          <button class="wbtn restore" onclick="restoreM(${m.id})">복구</button>
          <button class="wbtn del" onclick="permDel(${m.id})">영구삭제</button>
        </div>
      </div>
      ${m.wdNote ? `<div class="wnote">💬 ${m.wdNote}</div>` : ''}
    </div>`).join('')}
  `).join('');
}

// ── 금액/납부 모달 ─────────────────────────────────────
let AMT_ID = null, AMT_KEY = null;
function openAmtModal(id, key) {
  // 미납 클릭 → 바로 기본금액으로 납부 처리
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  if (m.plan && (m.plan.type === '완납' || m.plan.type === '선납')) return;
  const defaultFee = m.memberFee || D.months.find(x=>x.key===key)?.fee || 5000;
  m.pay[key] = true;
  if (!m.amt) m.amt = {};
  if (defaultFee !== 5000) m.amt[key] = defaultFee;
  // 가족 구성원 확인
  if (m.fgId) {
    const famUnpaid = D.members.filter(x => x.fgId===m.fgId && x.id!==id && !isPaid(x,key))
      .sort((a,b)=>(REL_ORDER[a.fgRel]??9)-(REL_ORDER[b.fgRel]??9));
    famUnpaid.forEach(fm => {
      if (confirm(`${fm.name}님도 납부 처리할까요?`)) fm.pay[key] = true;
    });
  }
  sv(); render();
}
function openAmtModalFull(id, key) {
  // 💰 버튼용 - 금액 입력 모달
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  AMT_ID = id; AMT_KEY = key;
  const defaultFee = m.memberFee || D.months.find(x=>x.key===key)?.fee || 5000;
  document.getElementById('amt-val').value = m.amt?.[key] || defaultFee;
  document.getElementById('amt-name').textContent = m.name;
  document.getElementById('amt-month').textContent = (D.months.find(x=>x.key===key)?.label || key) + ' 납부';
  const unpaidBefore = D.months.filter(mo => mo.key < key && !isPaid(m, mo.key) && !isNA(m, mo.key));
  const lateRow = document.getElementById('amt-late-row');
  const lateSel = document.getElementById('amt-late-month');
  const lateChk = document.getElementById('amt-is-late');
  lateChk.checked = false;
  lateSel.style.display = 'none';
  if (unpaidBefore.length) {
    lateRow.style.display = '';
    lateSel.innerHTML = '<option value="">후납 대상 월 선택...</option>' +
      unpaidBefore.map(mo => `<option value="${mo.key}">${mo.label}</option>`).join('');
    lateChk.onchange = () => { lateSel.style.display = lateChk.checked ? '' : 'none'; };
  } else {
    lateRow.style.display = 'none';
  }
  document.getElementById('amtm').classList.add('on');
}
function toggleP(id, key) {
  openAmtModal(id, key);
}
function saveAmt() {
  const m = D.members.find(x => x.id === AMT_ID);
  if (!m) return;
  const val = parseInt(document.getElementById('amt-val').value) || 0;
  const defaultFee = m.memberFee || D.months.find(x=>x.key===AMT_KEY)?.fee || 5000;
  m.pay[AMT_KEY] = true;

  // 후납 처리
  const isLate = document.getElementById('amt-is-late')?.checked;
  const lateMon = document.getElementById('amt-late-month')?.value;
  if (isLate && lateMon) {
    if (!m.lateKeys) m.lateKeys = {};
    if (!m.lateKeys[AMT_KEY]) m.lateKeys[AMT_KEY] = [];
    if (!m.lateKeys[AMT_KEY].includes(lateMon)) m.lateKeys[AMT_KEY].push(lateMon);
    m.pay[lateMon] = true;
    const baseFee = m.memberFee || D.months.find(x=>x.key===AMT_KEY)?.fee || 5000;
    m.amt[AMT_KEY] = baseFee * (m.lateKeys[AMT_KEY].length + 1);
  } else {
    if (val !== defaultFee) m.amt[AMT_KEY] = val; else delete m.amt[AMT_KEY];
  }

  // 가족 구성원 확인
  if (m.fgId) {
    const famUnpaid = D.members
      .filter(x => x.fgId === m.fgId && x.id !== AMT_ID && !isPaid(x, AMT_KEY))
      .sort((a,b) => (REL_ORDER[a.fgRel]??9)-(REL_ORDER[b.fgRel]??9));
    famUnpaid.forEach(fm => {
      const relLabel = fm.fgRel ? `(${fm.fgRel})` : '';
      if (confirm(`${fm.name}${relLabel}님도 납부 처리할까요?`)) fm.pay[AMT_KEY] = true;
    });
  }
  closeOv('amtm'); sv(); render();
}

// ── TOGGLE PAY (기존 호환용) ─────────────────────────────────────────
function toggleCancel(id, key) {
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  delete m.pay[key];
  if (m.amt) delete m.amt[key];
  sv(); render();
}
function toggleCol(key) {
  if (!R.hiddenCols.has(key)) { R.hiddenCols.add(key); render(); }
}
function showPrevOne() {
  // hiddenBefore(보이는 첫 달 왼쪽) 중 가장 가까운 1개 표시
  const vis = D.months.filter(m => !R.hiddenCols.has(m.key));
  const firstVis = vis[0]?.key;
  const before = firstVis ? D.months.filter(m => R.hiddenCols.has(m.key) && m.key < firstVis) : [];
  if (before.length) { R.hiddenCols.delete(before[before.length-1].key); render(); }
}
function showNextOne() {
  // hiddenAfter(보이는 마지막 달 오른쪽) 중 가장 가까운 1개 표시
  const vis = D.months.filter(m => !R.hiddenCols.has(m.key));
  const lastVis = vis[vis.length-1]?.key;
  const after = lastVis ? D.months.filter(m => R.hiddenCols.has(m.key) && m.key > lastVis) : [];
  if (after.length) { R.hiddenCols.delete(after[0].key); render(); }
}
function revealBetweenOne(afterKey, beforeKey) {
  // 두 보이는 달 사이 숨겨진 달 중 가장 가까운 1개만 표시
  const between = D.months.filter(m => R.hiddenCols.has(m.key) && m.key > afterKey && m.key < beforeKey);
  if (between.length) { R.hiddenCols.delete(between[0].key); render(); }
}
function revealBetween(afterKey, beforeKey) { revealBetweenOne(afterKey, beforeKey); }
function showPrevMonths() { showPrevOne(); }
function showNextMonths() { showNextOne(); }
function showAllHidden() { R.hiddenCols.clear(); render(); }
function restoreOneHidden() { showNextOne(); }

// ── MEMBER MODAL ─────────────────────────────────────
function openMM() {
  EID = null;
  document.getElementById('mm-t').textContent = '👤 회원 추가';
  document.getElementById('mm-s').textContent = '추가';
  document.getElementById('mm-danger').style.display = 'none';
  ['fn','fy','fm','frc','f-fee','f-start'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ffleader').checked = false;
  document.getElementById('fg2').value = '남';
  document.getElementById('fr').value = '일반';
  document.getElementById('frcw').style.display = 'none';
  fillFamDrop(null, null, null);
  document.getElementById('mm').classList.add('on');
  setTimeout(() => document.getElementById('fn').focus(), 100);
}
function openEM(id) {
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  ACTIVE_ID = id; render();
  EID = id;
  document.getElementById('mm-t').textContent = '✏️ 회원 정보 수정';
  document.getElementById('mm-s').textContent = '저장';
  document.getElementById('mm-danger').style.display = 'flex'; document.getElementById('mm-danger').style.setProperty('display','flex');
  document.getElementById('fn').value = m.name;
  document.getElementById('fy').value = m.year;
  document.getElementById('fg2').value = m.g;
  const std = ['운영진','부운영진','일반','미성년'];
  if (std.includes(m.role)) {
    document.getElementById('fr').value = m.role;
    document.getElementById('frcw').style.display = 'none';
  } else {
    document.getElementById('fr').value = '기타';
    document.getElementById('frc').value = m.role;
    document.getElementById('frcw').style.display = '';
  }
  document.getElementById('fm').value = m.memo || ''; document.getElementById('fm').scrollTop = 0;
  document.getElementById('f-fee').value = m.memberFee || '';
  document.getElementById('f-start').value = m.startMonth || '';
  const spId = m.fgId ? D.members.find(x => x.fgId === m.fgId && x.id !== id)?.id : null;
  fillFamDrop(id, spId, m.fgRel || '배우자', m.fgLeader);
  document.getElementById('mm').classList.add('on');
}
function fillFamDrop(exId, curId, curRel, curLeader) {
  const sel = document.getElementById('ffm');
  sel.innerHTML = '<option value="">연결 안 함</option>';
  D.members.filter(m => m.id !== exId).forEach(m => {
    const o = document.createElement('option');
    o.value = m.id; o.textContent = `${m.name} (${m.role})`;
    sel.appendChild(o);
  });
  sel.value = curId || '';
  const showFam = !!curId;
  document.getElementById('ffrw').style.display = showFam ? '' : 'none';
  document.getElementById('ffleader-row').style.display = showFam ? '' : 'none';
  if (curRel) document.getElementById('ffr').value = curRel;
  if (curLeader !== undefined) document.getElementById('ffleader').checked = !!curLeader;
  sel.onchange = () => {
    const v = !!sel.value;
    document.getElementById('ffrw').style.display = v ? '' : 'none';
    document.getElementById('ffleader-row').style.display = v ? '' : 'none';
  };
}
function saveMember() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  const year = parseInt(document.getElementById('fy').value) || 1990;
  const g = document.getElementById('fg2').value;
  let role = document.getElementById('fr').value;
  if (role === '기타') role = document.getElementById('frc').value.trim() || '기타';
  const memo = document.getElementById('fm').value.trim();
  const famSel = document.getElementById('ffm').value;
  const famRel = document.getElementById('ffr').value;
  // 미성년은 보호자 연결 필수
  if (role === '미성년' && !famSel) {
    alert('미성년 회원은 보호자(가족회원)를 반드시 연결해야 합니다.');
    return;
  }
  const memberFee = parseInt(document.getElementById('f-fee').value) || null;
  const startMonth = document.getElementById('f-start').value || null;
  const isLeader = document.getElementById('ffleader').checked;
  if (EID) {
    const m = D.members.find(x => x.id === EID);
    Object.assign(m, { name, year, g, role, memo, memberFee, startMonth });
    if (famSel) {
      const t = D.members.find(x => x.id == famSel);
      if (t) {
        const fg = t.fgId || ('fg_' + Date.now());
        t.fgId = fg; if (!t.fgRel) t.fgRel = famRel;
        m.fgId = fg; m.fgRel = famRel;
        // 대표 설정: 같은 가족 내 fgLeader 초기화 후 이 멤버에 설정
        if (isLeader) {
          D.members.filter(x => x.fgId === fg).forEach(x => { x.fgLeader = false; });
          m.fgLeader = true;
        } else {
          m.fgLeader = false;
        }
      }
    } else { m.fgId = null; m.fgRel = ''; m.fgLeader = false; }
  } else {
    const id = Date.now(); let fgId = null, fgRel = '';
    if (famSel) {
      const t = D.members.find(x => x.id == famSel);
      if (t) {
        fgId = t.fgId || ('fg_' + Date.now()); t.fgId = fgId; if (!t.fgRel) t.fgRel = famRel; fgRel = famRel;
        if (isLeader) {
          D.members.filter(x => x.fgId === fgId).forEach(x => { x.fgLeader = false; });
        }
      }
    }
    D.members.push({ id, name, year, g, role, fgId, fgRel, fgLeader: isLeader, pay: {}, amt: {}, plan: null, memo, memberFee, startMonth });
  }
  sv(); closeOv('mm'); render();
}
function deleteMember() {
  const m = D.members.find(x => x.id === EID);
  if (!m || !confirm(`'${m.name}' 회원을 삭제할까요?`)) return;
  D.members = D.members.filter(x => x.id !== EID);
  sv(); closeOv('mm'); render();
}
function openWdFromEdit() { closeOv('mm'); openWM(EID); }

// ── PLAN MODAL ────────────────────────────────────────
function openPM(id) {
  PMI = id; ACTIVE_ID = id; render();
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  PL_LATE = m.plan?.late || false; // 기존 late 값 로드
  document.getElementById('pl-name').textContent = m.name;
  setPT(null, (m.plan?.type === '완납' ? '선납' : m.plan?.type) || '월납');
  document.getElementById('plm').classList.add('on');
}
let PL_LATE = false; // 부분납입 후납 여부
function setPT(el, type) {
  PT = type || el?.dataset.pt || '월납';
  document.querySelectorAll('.ptab').forEach(b => b.classList.toggle('on', b.dataset.pt === PT));
  const now = new Date(), y = now.getFullYear();
  const m = D.members.find(x => x.id === PMI);
  let h = '';
  if (PT === '선납') {
    const existPlan = m?.plan?.type === '선납' ? m.plan : null;
    const existRanges = existPlan?.ranges || (existPlan ? [{start:existPlan.start,end:existPlan.end,amount:existPlan.amount,late:existPlan.late||false}] : []);
    const rangesHtml = existRanges.length
      ? existRanges.map((r,i) => renderRangeRow(r,i)).join('')
      : renderRangeRow({start:y+'-01',end:y+'-03',amount:'',late:false},0);
    h = `<div id="plan-ranges">${rangesHtml}</div>
         <button type="button" onclick="addPlanRange()" style="width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1.5px dashed var(--bd);background:white;color:var(--b);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer">+ 부분납입 추가</button>`;
  } else {
    h = `<div class="info-box">매월 개별 납부로 처리됩니다.<br>기존 완납/선납 계획이 해제됩니다.</div>`;
  }
  document.getElementById('pl-detail').innerHTML = h;
}
function setPLLate(val) {
  PL_LATE = val;
  const n = document.getElementById('pl-late-n');
  const y = document.getElementById('pl-late-y');
  if (!n||!y) return;
  [n,y].forEach(b => {
    const on = (b.id === 'pl-late-y') === val;
    b.style.borderColor = on ? '#4f46e5' : 'var(--bd)';
    b.style.background = on ? '#eef2ff' : 'white';
    b.style.color = on ? '#4f46e5' : 'var(--tx2)';
  });
}
function renderRangeRow(r, idx) {
  const lateN = !r.late ? '#4f46e5' : 'var(--bd)';
  const lateY = r.late  ? '#4f46e5' : 'var(--bd)';
  const lateBgN = !r.late ? '#eef2ff' : 'white';
  const lateBgY = r.late  ? '#eef2ff' : 'white';
  const lateClrN = !r.late ? '#4f46e5' : 'var(--tx2)';
  const lateClrY = r.late  ? '#4f46e5' : 'var(--tx2)';
  return `<div class="plan-range-row" style="background:#f8f9fb;border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px;position:relative">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:var(--tx2)">구간 ${idx+1}</span>
      ${idx > 0 ? `<button type="button" onclick="removeRangeRow(this)" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:13px;padding:0">✕</button>` : ''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">시작 월</label><input class="fi pr-start" type="month" value="${r.start||''}"></div>
      <div><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">종료 월</label><input class="fi pr-end" type="month" value="${r.end||''}"></div>
    </div>
    <div style="margin-bottom:8px"><label style="font-size:10px;color:var(--tx2);display:block;margin-bottom:3px">납부 금액 (원)</label><input class="fi pr-amt" type="number" value="${r.amount||''}" placeholder="예: 15000"></div>
    <div style="display:flex;gap:6px">
      <button type="button" onclick="toggleRangeLate(this,false)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lateN};background:${lateBgN};color:${lateClrN};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">선납</button>
      <button type="button" onclick="toggleRangeLate(this,true)" style="flex:1;padding:6px;border-radius:6px;border:1.5px solid ${lateY};background:${lateBgY};color:${lateClrY};font-family:inherit;font-size:11px;font-weight:600;cursor:pointer">후납</button>
    </div>
    <input type="hidden" class="pr-late" value="${r.late||false}">
  </div>`;
}
function addPlanRange() {
  const container = document.getElementById('plan-ranges');
  if (!container) return;
  const idx = container.querySelectorAll('.plan-range-row').length;
  const div = document.createElement('div');
  div.innerHTML = renderRangeRow({start:'',end:'',amount:'',late:false}, idx);
  container.appendChild(div.firstChild);
}
function removeRangeRow(btn) {
  btn.closest('.plan-range-row').remove();
  // 구간 번호 재정렬
  document.querySelectorAll('.plan-range-row').forEach((row,i) => {
    const label = row.querySelector('span');
    if (label) label.textContent = '구간 ' + (i+1);
  });
}
function toggleRangeLate(btn, val) {
  const row = btn.closest('.plan-range-row');
  const hidden = row.querySelector('.pr-late');
  if (hidden) hidden.value = val;
  const btns = row.querySelectorAll('button[onclick*="toggleRangeLate"]');
  btns.forEach(b => {
    const isThis = b === btn;
    b.style.borderColor = isThis ? '#4f46e5' : 'var(--bd)';
    b.style.background = isThis ? '#eef2ff' : 'white';
    b.style.color = isThis ? '#4f46e5' : 'var(--tx2)';
  });
}
function savePlan() {
  const m = D.members.find(x => x.id === PMI);
  if (!m) return;
  if (PT === '선납') {
    // 현재 ranges 유지하면서 추가 or 전체 교체
    const existRanges = (m.plan?.type === '선납' && m.plan.ranges) ? [...m.plan.ranges] : [];
    // UI에서 편집 중인 구간들 수집
    const newRanges = [];
    const rows = document.querySelectorAll('.plan-range-row');
    rows.forEach(row => {
      const s2 = row.querySelector('.pr-start')?.value;
      const e2 = row.querySelector('.pr-end')?.value;
      const a2Raw = row.querySelector('.pr-amt')?.value;
      const a2 = a2Raw !== '' ? (parseInt(a2Raw)||0) : 0;
      const late2 = row.querySelector('.pr-late')?.value === 'true';
      if (s2 && e2) newRanges.push({start:s2, end:e2, amount:a2, late:late2});
    });
    if (!newRanges.length) {
      const s = document.getElementById('pl-s')?.value;
      const e = document.getElementById('pl-e')?.value;
      const aRaw = document.getElementById('pl-a')?.value;
      const a = aRaw !== '' ? (parseInt(aRaw)||0) : (m.plan?.amount ?? 0);
      if (s && e) newRanges.push({start:s, end:e, amount:a, late:PL_LATE});
    }
    if (!newRanges.length) return;
    // start 기준 정렬
    newRanges.sort((a,b) => a.start.localeCompare(b.start));
    m.plan = { type: '선납', ranges: newRanges,
      start: newRanges[0].start, end: newRanges[newRanges.length-1].end,
      amount: newRanges[0].amount, late: newRanges[0].late };
    // 모든 구간 pay 설정
    newRanges.forEach(r => {
      let d = new Date(r.start + '-01');
      const ed = new Date(r.end + '-01');
      while (d <= ed) { m.pay[mkey(d.getFullYear(), d.getMonth()+1)] = true; d = new Date(d.getFullYear(), d.getMonth()+1, 1); }
    });
  } else {
    m.plan = { type: '월납' };
  }
  sv(); closeOv('plm'); render();
}

// ── WITHDRAW ──────────────────────────────────────────
function openWM(id) {
  WMI = id;
  const m = D.members.find(x => x.id === id);
  if (!m) return;
  document.getElementById('wd-info').textContent = `'${m.name}' 회원을 탈퇴 처리합니다. 탈퇴회원 탭에서 언제든 복구 가능합니다.`;
  document.getElementById('wdd').value = new Date().toISOString().substring(0, 10);
  document.getElementById('wdd').disabled = false;
  document.getElementById('wdd-unk').checked = false;
  document.getElementById('wdnote').value = '';
  document.getElementById('wdm').classList.add('on');
}
function openEditWd(id) {
  const m = D.withdrawn.find(x => x.id === id);
  if (!m) return;
  WMI = id;
  document.getElementById('wd-info').textContent = `'${m.name}' 탈퇴 정보를 수정합니다.`;
  const unk = !!m.wdUnknown;
  document.getElementById('wdd-unk').checked = unk;
  document.getElementById('wdd').value = m.wdate || '';
  document.getElementById('wdd').disabled = unk;
  document.getElementById('wdnote').value = m.wdNote || '';
  document.getElementById('wdm').classList.add('on');
  // swap button to update mode
  document.querySelector('#wdm .mdng').textContent = '수정 저장';
  document.querySelector('#wdm .mdng').onclick = () => {
    const tgt = D.withdrawn.find(x => x.id === WMI);
    if (!tgt) return;
    tgt.wdUnknown = document.getElementById('wdd-unk').checked;
    tgt.wdate = tgt.wdUnknown ? null : (document.getElementById('wdd').value || null);
    tgt.wdNote = document.getElementById('wdnote').value.trim();
    sv(); closeOv('wdm'); renderW();
    document.querySelector('#wdm .mdng').textContent = '탈퇴 처리';
    document.querySelector('#wdm .mdng').onclick = doWithdraw;
  };
}
function doWithdraw() {
  const m = D.members.find(x => x.id === WMI);
  if (!m) return;
  const unk = document.getElementById('wdd-unk').checked;
  m.wdUnknown = unk;
  m.wdate = unk ? null : (document.getElementById('wdd').value || null);
  m.wdNote = document.getElementById('wdnote').value.trim();
  D.members = D.members.filter(x => x.id !== WMI);
  D.withdrawn.push(m);
  sv(); closeOv('wdm'); render();
}
function restoreM(id) {
  const i = D.withdrawn.findIndex(x => x.id === id);
  if (i === -1) return;
  const m = D.withdrawn.splice(i, 1)[0];
  delete m.wdate;
  D.members.push(m);
  sv(); renderW();
}
function permDel(id) {
  if (!confirm('완전히 삭제합니다. 복구 불가합니다.')) return;
  D.withdrawn = D.withdrawn.filter(x => x.id !== id);
  sv(); renderW();
}

// ── MONTH MODAL ───────────────────────────────────────
function openMoM() {
  const now = new Date();
  document.getElementById('moy').value = now.getFullYear();
  document.getElementById('mo2').value = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('mom').classList.add('on');
}
function saveMonth() {
  const y = document.getElementById('moy').value;
  const m = document.getElementById('mo2').value;
  const fee = parseInt(document.getElementById('mofee').value) || 5000;
  const key = `${y}-${m}`;
  if (D.months.find(x => x.key === key)) { alert('이미 추가된 월입니다.'); return; }
  D.months.push({ key, label: `${parseInt(m)}월`, fee });
  D.months.sort((a, b) => a.key.localeCompare(b.key));

  // 완납/선납 회원 자동 pay 처리
  D.members.forEach(mb => {
    if (!mb.plan) return;
    const p = mb.plan;
    if (p.type === '완납' && key.startsWith(String(p.year))) {
      mb.pay[key] = true;
    } else if (p.type === '선납' && key >= p.start && key <= p.end) {
      mb.pay[key] = true;
    }
  });

  R.cm = key;
  sv(); closeOv('mom'); render();
}

// ── FIREBASE 미설정 안내 ──────────────────────────────

  b.innerHTML = `<div style="font-weight:700;margin-bottom:4px">⚠️ 현재 이 기기에만 저장되는 상태입니다 (Firebase 미설정)</div>

    설정 방법: <strong>1)</strong> <a href="https://console.firebase.google.com" target="_blank" style="color:#1e1b4b">console.firebase.google.com</a> → 프로젝트 추가 → 웹앱 등록 → 
    <strong>2)</strong> Realtime Database 생성 (테스트 모드) →

// ── UTILS ─────────────────────────────────────────────
function closeOv(id) { document.getElementById(id).classList.remove('on'); if(id==='mm'||id==='plm'){ACTIVE_ID=null;} }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') ['mm','plm','wdm','mom','amtm'].forEach(closeOv);
});
document.querySelectorAll('.ov').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('on'); });
});
